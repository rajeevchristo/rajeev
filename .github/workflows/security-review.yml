name: Go Security PR Review (Free & Low Noise)

on:
  pull_request:
    branches:
      - main
      - master
      - develop

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  security-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Run gosec
      - name: Run gosec
        uses: securego/gosec@v2.22.4
        with:
          args: -fmt=sarif -out=gosec.sarif -no-fail ./...

      # Run Trivy
      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          skip-dirs: 'vendor,node_modules,.git'

      # Setup reviewdog
      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      # Post gosec inline comments
      - name: Post gosec findings
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog \
            -f=sarif \
            -reporter=github-pr-review \
            -level=warning \
            < gosec.sarif || true

      # Post Trivy inline comments
      - name: Post Trivy findings
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog \
            -f=sarif \
            -reporter=github-pr-review \
            -level=warning \
            < trivy.sarif || true

      # Security Summary
      - name: Security Scan Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function severityIcon(sev) {
              sev = String(sev).toUpperCase();

              if (sev.includes('CRITICAL')) return '🛑 CRITICAL';
              if (sev.includes('HIGH')) return '🔴 HIGH';
              if (sev.includes('MEDIUM')) return '🟠 MEDIUM';
              if (sev.includes('LOW')) return '🟡 LOW';

              return '⚪ UNKNOWN';
            }

            function getCodeLine(file, line) {
              try {
                const lines = fs.readFileSync(file, 'utf8').split('\n');
                return lines[line - 1]?.trim() || 'Unable to read source';
              } catch {
                return 'Unable to read source';
              }
            }

            function parseSarif(file, tool) {

              if (!fs.existsSync(file)) {
                return [];
              }

              const sarif = JSON.parse(
                fs.readFileSync(file, 'utf8')
              );

              const findings = [];

              for (const run of sarif.runs || []) {

                const rules = run.tool?.driver?.rules || [];
                const results = run.results || [];

                for (const result of results) {

                  const rule = rules.find(
                    r => r.id === result.ruleId
                  );

                  const severity =
                    result.level ||
                    rule?.properties?.severity ||
                    'UNKNOWN';

                  const locationData =
                    result.locations?.[0]?.physicalLocation || {};

                  const filePath =
                    locationData.artifactLocation?.uri ||
                    'unknown file';

                  const line =
                    locationData.region?.startLine || '?';

                  const code =
                    typeof line === 'number'
                      ? getCodeLine(filePath, line)
                      : 'N/A';

                  findings.push({
                    tool,
                    severity: severityIcon(severity),
                    title:
                      rule?.shortDescription?.text ||
                      result.message?.text ||
                      'No description',
                    description:
                      result.message?.text ||
                      'No details',
                    filePath,
                    line,
                    code
                  });
                }
              }

              return findings;
            }

            const findings = [
              ...parseSarif('gosec.sarif', 'gosec'),
              ...parseSarif('trivy.sarif', 'Trivy')
            ];

            let body = '# 🔐 Security Scan Report\n\n';

            if (findings.length === 0) {

              body += '## ✅ No security issues found\n\n';
              body += 'Scanners used:\n';
              body += '- gosec\n';
              body += '- Trivy\n\n';
              body += 'Your PR passed all configured security checks 🎉';

            } else {

              body += '## ⚠️ ' + findings.length + ' Potential Security Issue(s) Found\n\n';

              for (const f of findings.slice(0, 20)) {

                body += '---\n\n';

                body += '### ' + f.severity + '\n\n';

                body += '- **Tool:** ' + f.tool + '\n';
                body += '- **Issue:** ' + f.title + '\n';
                body += '- **Location:** ' + f.filePath + ':' + f.line + '\n\n';

                body += '#### Vulnerable Code\n\n';

                body += '```go\n';
                body += f.code + '\n';
                body += '```\n\n';

                body += '#### Details\n\n';
                body += f.description + '\n\n';
              }
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
