name: Go Security PR Review (Free & Low Noise)

on:
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  security-review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Important for accurate diff scanning

      # ── gosec: Go-specific code security scanner (injection, crypto, etc.) ──
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: -fmt=sarif -out=gosec.sarif -no-fail ./...

      # ── govulncheck: Official Go dependency vulnerabilities (with reachability) ──
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.23'   # Change if you use a different Go version
          go-package: ./...
          format: sarif
          output: govulncheck.sarif

      # ── Trivy: Secrets + Go modules + filesystem scan ──
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      # ── reviewdog: Post clean inline comments on the PR diff ──
      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Post gosec findings
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: reviewdog -f=sarif -reporter=github-pr-review -level=error < gosec.sarif

      - name: Post govulncheck findings
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: reviewdog -f=sarif -reporter=github-pr-review -level=error < govulncheck.sarif

      - name: Post Trivy findings
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: reviewdog -f=sarif -reporter=github-pr-review -level=error < trivy.sarif
