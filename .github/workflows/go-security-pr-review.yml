name: Go Security PR Review (Free & Low Noise)

on:
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: write
  issues: write        # Needed for the summary comment

jobs:
  security-review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── gosec: Go code security scanner ──
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: -fmt=sarif -out=gosec.sarif -no-fail ./...

      # ── Trivy: Secrets + filesystem scan ──
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      # ── reviewdog: Post inline comments on the PR diff ──
      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Post gosec findings
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: reviewdog -f=sarif -reporter=github-pr-review -level=error < gosec.sarif || true

      - name: Post Trivy findings
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: reviewdog -f=sarif -reporter=github-pr-review -level=error < trivy.sarif || true

      # ── NEW: Security Scan Summary (always shows the message you asked for) ──
      - name: Security Scan Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const gosecSize = fs.existsSync('gosec.sarif') ? fs.statSync('gosec.sarif').size : 0;
            const trivySize = fs.existsSync('trivy.sarif') ? fs.statSync('trivy.sarif').size : 0;
            
            let message = '✅ **Security scan completed - No issues found**\n\n(gosec + Trivy scanned the PR diff)';
            
            if (gosecSize > 300 || trivySize > 300) {
              message = '⚠️ **Security scan completed** - Potential issues were found. Please check the inline comments above.';
            }
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
