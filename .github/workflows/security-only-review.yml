name: Security-Only PR Review (OpenAI GPT-4o-mini)
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}
      - name: Get PR diff
        run: git diff --no-color origin/${{ github.base_ref }}...HEAD > diff.txt
      - name: Run Security-Only Review with GPT-4o-mini
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('diff.txt', 'utf8');
            try {
              const prompt = `You are a senior Application Security Engineer.
            Your ONLY job is to analyze the code changes below and report security issues.
            STRICT RULES:
            - Report ONLY real security vulnerabilities (OWASP Top 10, CWE, injection, SSRF, auth bypass, broken access control, secrets leakage, logic flaws, data-flow issues, supply-chain risks, etc.).
            - NEVER comment on code style, performance, tests, maintainability, or anything non-security.
            - If no security issues are found, reply with exactly this one line: "✅ No security issues detected in this PR."
            - Classify every issue using EXACTLY one of these five severity levels: Critical, High, Medium, Low, Info.

            SEVERITY DEFINITIONS:
            - 🔴 Critical: Immediate exploitation possible, full system/data compromise (e.g. RCE, SQLi, hardcoded secrets, auth bypass).
            - 🟠 High: Significant impact, likely exploitable (e.g. SSRF, IDOR, privilege escalation, XSS in sensitive context).
            - 🟡 Medium: Moderate impact, requires specific conditions (e.g. open redirect, weak crypto, missing rate-limiting, CSRF).
            - 🔵 Low: Minor risk, limited impact (e.g. verbose error messages, missing security headers, overly broad CORS).
            - ℹ️ Info: Best-practice observations with negligible direct risk (e.g. dependency version pinning, minor config notes).

            OUTPUT FORMAT (use this exact structure):

            ## Security Review

            **Summary**: X security issue(s) found — 🔴 N Critical | 🟠 N High | 🟡 N Medium | 🔵 N Low | ℹ️ N Info
            *(or "No issues found" if none)*

            ---

            ### 🔴 Critical Issues
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | 🔴 Critical | path/to/file.py | 42 | Short title |

            **[CRIT-1] <Issue Title>**
            - **Description**: Clear explanation of the risk and why it is dangerous.
            - **CWE**: CWE-XXX – Name
            - **Fix Suggestion**:
            \`\`\`diff
            - Insecure code here
            + Secure code here
            \`\`\`

            ---

            ### 🟠 High Issues
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | 🟠 High | path/to/file.py | 15 | Short title |

            **[HIGH-1] <Issue Title>**
            - **Description**: Clear explanation of the risk and why it is dangerous.
            - **CWE**: CWE-XXX – Name
            - **Fix Suggestion**:
            \`\`\`diff
            - Insecure code here
            + Secure code here
            \`\`\`

            ---

            ### 🟡 Medium Issues
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | 🟡 Medium | path/to/file.py | 30 | Short title |

            **[MED-1] <Issue Title>**
            - **Description**: Clear explanation of the risk and why it is dangerous.
            - **CWE**: CWE-XXX – Name
            - **Fix Suggestion**:
            \`\`\`diff
            - Insecure code here
            + Secure code here
            \`\`\`

            ---

            ### 🔵 Low Issues
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | 🔵 Low | path/to/file.py | 8 | Short title |

            **[LOW-1] <Issue Title>**
            - **Description**: Clear explanation of the risk and why it is dangerous.
            - **CWE**: CWE-XXX – Name
            - **Fix Suggestion**:
            \`\`\`diff
            - Insecure code here
            + Secure code here
            \`\`\`

            ---

            ### ℹ️ Info
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | ℹ️ Info | path/to/file.py | 5 | Short title |

            **[INFO-1] <Issue Title>**
            - **Description**: Brief observation and recommended best practice.

            ---

            IMPORTANT: Omit any severity section entirely if there are zero issues at that level. Do not print empty tables.

            Now analyze the following PR changes:
            ${diff}`;
              const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": `Bearer ${process.env.OPENAI_API_KEY}`
                },
                body: JSON.stringify({
                  model: "gpt-4o-mini",
                  messages: [{ role: "user", content: prompt }],
                  temperature: 0.0,
                  max_tokens: 4000
                })
              });
              if (!response.ok) {
                const errorBody = await response.text();
                core.setFailed(`OpenAI API error ${response.status}: ${errorBody}`);
                return;
              }
              const data = await response.json();
              if (!data.choices || !data.choices[0] || !data.choices[0].message) {
                core.setFailed(`Unexpected OpenAI response: ${JSON.stringify(data)}`);
                return;
              }
              const reviewText = data.choices[0].message.content;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: reviewText
              });
            } catch (error) {
              core.setFailed(`Script error: ${error.message}`);
            }
