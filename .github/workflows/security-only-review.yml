name: Security-Only PR Review (OpenAI GPT-5.4-mini)
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Get PR diff
        run: git diff --no-color --unified=2 origin/${{ github.base_ref }}...HEAD > diff.txt

      - name: Validate available GPT-5.4 models
        run: |
          echo "Checking available GPT-5.4 models..."
          curl -s https://api.openai.com/v1/models \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            | jq '[.data[].id | select(test("5\\.4"; "i"))]'

      - name: Run Security-Only Review with GPT-5.4-mini
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const rawDiff = fs.readFileSync('diff.txt', 'utf8');

            // ─── CONFIG ────────────────────────────────────────────────
            const MAX_DIFF_CHARS        = 120000;  // ~30,000 input tokens — covers 1000+ lines
            const MAX_COMPLETION_TOKENS = 8000;    // enough for deep analysis of 1000 lines

            // Model priority list — first one that works wins
            const MODELS = [
              { name: 'gpt-5.4-mini',  useCompletionTokens: true  },
              { name: 'gpt-4o-mini',   useCompletionTokens: false }
            ];
            // ───────────────────────────────────────────────────────────

            const wasTruncated = rawDiff.length > MAX_DIFF_CHARS;

            const truncatedDiff = wasTruncated
              ? rawDiff.slice(0, MAX_DIFF_CHARS) + '\n\n[... diff truncated due to size ...]'
              : rawDiff;

            // Guard: skip if diff is empty
            if (!truncatedDiff.trim()) {
              console.log('No diff found. Skipping security review.');
              return;
            }

            console.log(`Raw diff size  : ${rawDiff.length} chars`);
            console.log(`Sent to model  : ${truncatedDiff.length} chars`);
            console.log(`Input  tokens (approx): ~${Math.round(truncatedDiff.length / 4)}`);
            console.log(`Output tokens (max):     ${MAX_COMPLETION_TOKENS}`);
            if (wasTruncated) {
              console.log('⚠️  WARNING: Diff was truncated — some changes were NOT reviewed!');
            }

            const today = new Date().toISOString().split('T')[0];

            const prompt = `You are a senior Application Security Engineer performing a thorough security audit.
            Your ONLY job is to analyze the code changes below and report security issues.

            STRICT RULES:
            - Report ONLY real security vulnerabilities (OWASP Top 10, CWE, injection, SSRF, auth bypass, broken access control, secrets leakage, logic flaws, data-flow issues, supply-chain risks, etc.).
            - NEVER comment on code style, performance, tests, maintainability, or anything non-security.
            - Classify every issue using EXACTLY one of: Critical, High, Medium, Low, Info.
            - You MUST analyze every single changed line deeply and trace data flows end to end.
            - Even if no issues are found, you MUST include a "Security Checklist" section listing every vulnerability class you checked (SQLi, XSS, SSRF, Auth, Secrets, IDOR, RCE, CSRF, Open Redirect, Weak Crypto, etc.) and one sentence explaining why each was ruled out. Never return a blank summary.
            - Never return 0 issues on a diff larger than 100 lines without providing the full checklist.

            SEVERITY DEFINITIONS:
            - 🔴 Critical : Immediate exploitation possible — RCE, SQLi, hardcoded secrets, auth bypass.
            - 🟠 High     : Significant impact, likely exploitable — SSRF, IDOR, privilege escalation, XSS.
            - 🟡 Medium   : Moderate impact, needs specific conditions — open redirect, weak crypto, missing rate-limit, CSRF.
            - 🔵 Low      : Minor risk, limited impact — verbose errors, missing security headers, overly broad CORS.
            - ℹ️  Info     : Best-practice observations — dependency pinning, minor config notes.

            OUTPUT FORMAT (follow exactly):

            ## 🔐 Security Review

            > **Model**: GPT-5.4-mini | **Scan Date**: ${today}

            **Summary**: X issue(s) found — 🔴 N Critical | 🟠 N High | 🟡 N Medium | 🔵 N Low | ℹ️ N Info

            ---

            ### 🔴 Critical Issues
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | 🔴 Critical | path/to/file | 42 | Short title |

            **[CRIT-1] Issue Title**
            - **Description**: What the risk is and why it is dangerous.
            - **CWE**: CWE-XXX – Name
            - **OWASP**: A0X:2021 – Category
            - **Fix**:
            \`\`\`diff
            - insecure code
            + secure code
            \`\`\`

            ---

            ### 🟠 High Issues
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | 🟠 High | path/to/file | 15 | Short title |

            **[HIGH-1] Issue Title**
            - **Description**: What the risk is and why it is dangerous.
            - **CWE**: CWE-XXX – Name
            - **OWASP**: A0X:2021 – Category
            - **Fix**:
            \`\`\`diff
            - insecure code
            + secure code
            \`\`\`

            ---

            ### 🟡 Medium Issues
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | 🟡 Medium | path/to/file | 30 | Short title |

            **[MED-1] Issue Title**
            - **Description**: What the risk is and why it is dangerous.
            - **CWE**: CWE-XXX – Name
            - **OWASP**: A0X:2021 – Category
            - **Fix**:
            \`\`\`diff
            - insecure code
            + secure code
            \`\`\`

            ---

            ### 🔵 Low Issues
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | 🔵 Low | path/to/file | 8 | Short title |

            **[LOW-1] Issue Title**
            - **Description**: What the risk is and why it is dangerous.
            - **CWE**: CWE-XXX – Name
            - **OWASP**: A0X:2021 – Category
            - **Fix**:
            \`\`\`diff
            - insecure code
            + secure code
            \`\`\`

            ---

            ### ℹ️ Info
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | ℹ️ Info | path/to/file | 5 | Short title |

            **[INFO-1] Issue Title**
            - **Description**: Brief observation and recommended best practice.
            - **CWE**: CWE-XXX – Name *(if applicable)*

            ---

            ### ✅ Security Checklist
            *(Always include this section even if no issues found)*

            | Vulnerability Class | Status | Notes |
            |---------------------|--------|-------|
            | SQL Injection (SQLi) | ✅ Not Found | No raw SQL queries with user input detected |
            | Cross-Site Scripting (XSS) | ✅ Not Found | No unsanitized output to HTML detected |
            | Server-Side Request Forgery (SSRF) | ✅ Not Found | No outbound requests with user-controlled URLs |
            | Authentication / Auth Bypass | ✅ Not Found | Auth checks appear intact |
            | Hardcoded Secrets / API Keys | ✅ Not Found | No secrets or tokens found in diff |
            | Insecure Direct Object Reference (IDOR) | ✅ Not Found | Access control checks present |
            | Remote Code Execution (RCE) | ✅ Not Found | No eval or shell exec with user input |
            | Cross-Site Request Forgery (CSRF) | ✅ Not Found | CSRF tokens in place |
            | Open Redirect | ✅ Not Found | Redirect targets are validated |
            | Weak Cryptography | ✅ Not Found | No weak hash or cipher usage |
            | Broken Access Control | ✅ Not Found | Role checks appear correct |
            | Supply Chain / Dependency Risk | ✅ Not Found | No suspicious new dependencies |

            ---

            > ⚠️ *Auto-generated review. Always verify findings manually before acting.*

            IMPORTANT:
            - Omit any severity section entirely if zero issues at that level.
            - Never print empty tables.
            - Number issues per group: CRIT-1, CRIT-2, HIGH-1, HIGH-2, MED-1, LOW-1, INFO-1 etc.
            - ALWAYS include the Security Checklist section at the end, filled with real observations from the diff.

            PR changes to analyze:
            ${truncatedDiff}`;

            try {
              let response, usedModel;

              for (const model of MODELS) {
                console.log(`Trying model: ${model.name}`);

                const tokenParam = model.useCompletionTokens
                  ? { max_completion_tokens: MAX_COMPLETION_TOKENS }
                  : { max_tokens: MAX_COMPLETION_TOKENS };

                response = await fetch("https://api.openai.com/v1/chat/completions", {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${process.env.OPENAI_API_KEY}`
                  },
                  body: JSON.stringify({
                    model: model.name,
                    messages: [
                      {
                        role: "system",
                        content: `You are an aggressive security auditor who never misses vulnerabilities.
You MUST analyze every changed line deeply and trace all data flows.
You MUST always return the full Security Checklist section at the end.
Never return a response under 300 tokens — a thorough review always requires detailed output.
If you find nothing critical, explain exactly what you checked and why it was ruled safe.`
                      },
                      {
                        role: "user",
                        content: prompt
                      }
                    ],
                    temperature: 0.1,
                    ...tokenParam
                  })
                });

                if (response.ok) {
                  usedModel = model.name;
                  console.log(`✅ Using model: ${usedModel}`);
                  break;
                }

                const errorBody = await response.text();
                console.warn(`⚠️ Model ${model.name} failed (HTTP ${response.status}): ${errorBody}`);

                if (response.status !== 404 && response.status !== 400) {
                  core.setFailed(`OpenAI API error ${response.status}: ${errorBody}`);
                  return;
                }
              }

              if (!response || !response.ok) {
                core.setFailed('All model fallbacks exhausted. Could not complete security review.');
                return;
              }

              const data = await response.json();

              if (!data.choices?.[0]?.message?.content) {
                core.setFailed(`Unexpected OpenAI response structure: ${JSON.stringify(data)}`);
                return;
              }

              const reviewText = data.choices[0].message.content;

              const usage = data.usage || {};
              console.log('─── Token Usage ───────────────────────────');
              console.log(`  Prompt (input)     : ${usage.prompt_tokens     ?? 'N/A'} tokens`);
              console.log(`  Completion (output): ${usage.completion_tokens ?? 'N/A'} tokens`);
              console.log(`  Total              : ${usage.total_tokens      ?? 'N/A'} tokens`);
              console.log('───────────────────────────────────────────');

              // Warn in Actions log if output tokens are suspiciously low
              if ((usage.completion_tokens ?? 0) < 300) {
                console.warn('⚠️  WARNING: Output tokens very low — model may not have done a full review!');
              }

              const footer = [
                '',
                '---',
                wasTruncated ? '> ⚠️ **Warning**: Diff was truncated — some changes were **NOT reviewed**. Consider splitting this PR.' : '',
                (usage.completion_tokens ?? 0) < 300 ? '> ⚠️ **Warning**: Model output was very short — review may be incomplete. Re-run or review manually.' : '',
                `> 🤖 **Model used**: \`${usedModel}\``,
                `> 📊 **Tokens** — Input: \`${usage.prompt_tokens ?? 'N/A'}\` | Output: \`${usage.completion_tokens ?? 'N/A'}\` | Total: \`${usage.total_tokens ?? 'N/A'}\``,
                `> 📅 **Scanned**: ${today}`
              ].filter(Boolean).join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: reviewText + footer
              });

              console.log(`Security review posted successfully on PR #${context.issue.number}`);

            } catch (error) {
              core.setFailed(`Script error: ${error.message}\n${error.stack}`);
            }
