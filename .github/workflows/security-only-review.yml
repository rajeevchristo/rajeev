name: Security-Only PR Review (Claude Haiku 4.5)
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # FIX 1: Merged fetch + diff into one atomic step so the base ref is
      # guaranteed to exist before git diff reads it. Previously the two steps
      # were separate; if fetch silently failed, git diff would diff against a
      # stale or missing ref without any error surfacing.
      - name: Fetch base branch and generate diff
        run: |
          git fetch origin "${{ github.base_ref }}" || {
            echo "::error::Failed to fetch base branch ${{ github.base_ref }}"
            exit 1
          }
          git diff --no-color --unified=2 "origin/${{ github.base_ref }}...HEAD" > diff.txt
          echo "Diff size: $(wc -c < diff.txt) bytes"

      - name: Check Anthropic API access
        id: quota_check
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        with:
          # github-script@v7 calls getInput('github-token') unconditionally at
          # bootstrap — the input is mandatory even if the script never uses the
          # GitHub API. Use the default GITHUB_TOKEN (least privilege) here
          # rather than BOT_TOKEN since this step only needs it to post a
          # comment on auth/rate-limit failures; full bot permissions aren't required.
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // FIX 4: Guard against an unset SLACK_WEBHOOK so failures surface
            // clearly rather than being silently swallowed.
            const sendSlackAlert = async (message) => {
              const webhookUrl = process.env.SLACK_WEBHOOK;
              if (!webhookUrl) {
                console.warn("SLACK_WEBHOOK secret is not set — skipping Slack alert.");
                return;
              }
              try {
                // FIX 9: Added AbortSignal timeout on all fetch calls so a
                // hung API call fails fast with a clear error instead of
                // stalling the runner until the job-level timeout fires.
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                await fetch(webhookUrl, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ text: message }),
                  signal: controller.signal
                });
                clearTimeout(timeoutId);
              } catch (slackErr) {
                console.warn(`Slack alert failed: ${slackErr.message}`);
              }
            };

            // FIX 9: Timeout on Anthropic ping as well.
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);
            let response;
            try {
              response = await fetch("https://api.anthropic.com/v1/messages", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "x-api-key": process.env.ANTHROPIC_API_KEY,
                  "anthropic-version": "2023-06-01"
                },
                body: JSON.stringify({
                  model: "claude-haiku-4-5",
                  max_tokens: 1,
                  messages: [{ role: "user", content: "ping" }]
                }),
                signal: controller.signal
              });
            } catch (fetchErr) {
              clearTimeout(timeoutId);
              await sendSlackAlert(
                `🔴 *Security Review Failed — Anthropic API Unreachable*\n` +
                `> *Repo*: ${context.repo.owner}/${context.repo.repo}\n` +
                `> *PR*: #${context.issue.number}\n` +
                `> *Reason*: Network error or timeout during API ping.\n` +
                `> *Detail*: \`${fetchErr.message}\``
              );
              core.setFailed(`Anthropic API unreachable: ${fetchErr.message}`);
              return;
            }
            clearTimeout(timeoutId);

            if (response.ok) {
              console.log("Anthropic API check passed.");
              core.setOutput("quota_ok", "true");
              return;
            }

            const errorBody = await response.json().catch(() => ({}));
            const errorType = errorBody?.error?.type ?? "";
            const errorMsg  = errorBody?.error?.message ?? JSON.stringify(errorBody);

            console.warn(`Anthropic API check failed (HTTP ${response.status}): ${errorMsg}`);
            core.setOutput("quota_ok", "false");

            if (response.status === 429 || errorType === "rate_limit_error") {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  "## Security Review — Skipped ⚠️",
                  "",
                  "> **Reason**: Anthropic API rate limit or quota exceeded.",
                  "> Reported to security team."
                ].join("\n")
              });

              await sendSlackAlert(
                `⚠️ *Security Review Skipped — Anthropic API Rate Limit / Quota Exceeded*\n` +
                `> *Repo*: ${context.repo.owner}/${context.repo.repo}\n` +
                `> *PR*: #${context.issue.number}\n` +
                `> *Reason*: Anthropic API returned rate limit or quota error.\n` +
                `> *Action*: Check your Anthropic API plan or rotate the \`ANTHROPIC_API_KEY\` secret.`
              );

              core.setFailed("Security review skipped: Anthropic API rate limit or quota exceeded.");
            } else if (response.status === 401 || errorType === "authentication_error") {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  "## Security Review — Skipped ⚠️",
                  "",
                  "> **Reason**: Anthropic API key is invalid or missing.",
                  "> Reported to security team."
                ].join("\n")
              });

              await sendSlackAlert(
                `🔴 *Security Review Failed — Invalid Anthropic API Key*\n` +
                `> *Repo*: ${context.repo.owner}/${context.repo.repo}\n` +
                `> *PR*: #${context.issue.number}\n` +
                `> *Reason*: API key is invalid or not set.\n` +
                `> *Action*: Rotate the \`ANTHROPIC_API_KEY\` secret in repository settings.`
              );

              core.setFailed("Security review skipped: Anthropic API key invalid.");
            } else {
              await sendSlackAlert(
                `🔴 *Security Review Failed — Anthropic API Check Error*\n` +
                `> *Repo*: ${context.repo.owner}/${context.repo.repo}\n` +
                `> *PR*: #${context.issue.number}\n` +
                `> *Reason*: Unexpected error during API check (HTTP ${response.status}).\n` +
                `> *Detail*: \`${errorMsg}\``
              );

              core.setFailed(`Anthropic API check failed with unexpected error (HTTP ${response.status}).`);
            }

      - name: Run Security-Only Review with Claude Haiku 4.5
        if: steps.quota_check.outputs.quota_ok == 'true'
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // ─── CONFIG ────────────────────────────────────────────────
            const MAX_DIFF_CHARS  = 120000;
            const MAX_TOKENS      = 8000;
            const MODEL           = "claude-haiku-4-5";
            // ───────────────────────────────────────────────────────────

            // FIX 4: Guard against unset SLACK_WEBHOOK before any use.
            const sendSlackAlert = async (message) => {
              const webhookUrl = process.env.SLACK_WEBHOOK;
              if (!webhookUrl) {
                console.warn("SLACK_WEBHOOK secret is not set — skipping Slack alert.");
                return;
              }
              try {
                // FIX 9: Timeout on Slack fetch calls too.
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                await fetch(webhookUrl, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ text: message }),
                  signal: controller.signal
                });
                clearTimeout(timeoutId);
              } catch (slackErr) {
                console.warn(`Slack alert failed: ${slackErr.message}`);
              }
            };

            // FIX 2: Guard against a missing or unreadable diff.txt so the
            // script fails with a clear message instead of an unhandled
            // fs.readFileSync exception that crashes with no useful context.
            let rawDiff;
            try {
              rawDiff = fs.readFileSync('diff.txt', 'utf8');
            } catch (readErr) {
              await sendSlackAlert(
                `🔴 *Security Review Failed — Could Not Read Diff*\n` +
                `> *Repo*: ${context.repo.owner}/${context.repo.repo}\n` +
                `> *PR*: #${context.issue.number}\n` +
                `> *Reason*: diff.txt missing or unreadable: ${readErr.message}`
              );
              core.setFailed(`Could not read diff.txt: ${readErr.message}`);
              return;
            }

            const prLink    = `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${context.issue.number}`;
            const repoLabel = `${context.repo.owner}/${context.repo.repo}`;

            const wasTruncated = rawDiff.length > MAX_DIFF_CHARS;
            const truncatedDiff = wasTruncated
              ? rawDiff.slice(0, MAX_DIFF_CHARS) + '\n\n[... diff truncated due to size ...]'
              : rawDiff;

            if (!truncatedDiff.trim()) {
              console.log('No diff found. Skipping security review.');
              return;
            }

            console.log(`Raw diff size  : ${rawDiff.length} chars`);
            console.log(`Sent to model  : ${truncatedDiff.length} chars`);
            console.log(`Input  tokens (approx): ~${Math.round(truncatedDiff.length / 4)}`);
            console.log(`Output tokens (max):     ${MAX_TOKENS}`);
            if (wasTruncated) {
              console.log('WARNING: Diff was truncated — some changes were NOT reviewed!');
            }

            const today = new Date().toISOString().split('T')[0];

            const systemPrompt = [
              "You are an aggressive security auditor who never misses vulnerabilities.",
              "You MUST analyze every changed line deeply and trace all data flows.",
              "You MUST always return the full Security Checklist section at the end.",
              "Never return a response under 300 tokens — a thorough review always requires detailed output.",
              "If you find nothing critical, explain exactly what you checked and why it was ruled safe.",
              "",
              "CVSS v3.1 SCORING IS MANDATORY AND STRICTLY MECHANICAL. You MUST follow these exact steps for every finding:",
              "",
              "STEP 1 — Assign each metric using ONLY the allowed values below:",
              "  AV (Attack Vector)       : N=Network | A=Adjacent | L=Local | P=Physical",
              "  AC (Attack Complexity)   : L=Low | H=High",
              "  PR (Privileges Required) : N=None | L=Low | H=High",
              "  UI (User Interaction)    : N=None | R=Required",
              "  S  (Scope)               : U=Unchanged | C=Changed",
              "  C  (Confidentiality)     : N=None | L=Low | H=High",
              "  I  (Integrity)           : N=None | L=Low | H=High",
              "  A  (Availability)        : N=None | L=Low | H=High",
              "",
              "STEP 2 — Calculate the CVSS v3.1 Base Score using the official NVD formula. No approximations. No gut-feel scores.",
              "",
              "STEP 3 — Derive severity STRICTLY from the computed score using these bands:",
              "  Critical : 9.0 - 10.0",
              "  High     : 7.0 - 8.9",
              "  Medium   : 4.0 - 6.9",
              "  Low      : 0.1 - 3.9",
              "  Info     : 0.0",
              "",
              "ABSOLUTE RULES:",
              "- You MUST NOT assign a severity label that does not match the computed CVSS Base Score band.",
              "- You MUST NOT override the computed score with subjective judgment, intuition, or context.",
              "- You MUST NOT skip the CVSS vector. Every finding requires a full vector string: CVSS:3.1/AV:?/AC:?/PR:?/UI:?/S:?/C:?/I:?/A:?",
              "- If you cannot assign a valid CVSS vector, do NOT report the finding.",
              "- The severity label in the table and in the finding detail MUST always match the score band. Any mismatch is a critical error.",
            ].join("\n");

            const userPrompt = "You are a senior Application Security Engineer performing a thorough security audit.\n" +
              "Your ONLY job is to analyze the code changes below and report security issues.\n\n" +
              "STRICT RULES:\n" +
              "- Report ONLY real security vulnerabilities (OWASP Top 10, CWE, injection, SSRF, auth bypass, broken access control, secrets leakage, logic flaws, data-flow issues, supply-chain risks, etc.).\n" +
              "- NEVER comment on code style, performance, tests, maintainability, or anything non-security.\n\n" +
              "CVSS v3.1 SCORING — YOU MUST FOLLOW THIS PROCESS FOR EVERY SINGLE FINDING WITHOUT EXCEPTION:\n\n" +
              "  STEP 1: Select one value per metric from the allowed set below:\n" +
              "    AV (Attack Vector)       : N = Network | A = Adjacent | L = Local | P = Physical\n" +
              "    AC (Attack Complexity)   : L = Low     | H = High\n" +
              "    PR (Privileges Required) : N = None    | L = Low      | H = High\n" +
              "    UI (User Interaction)    : N = None    | R = Required\n" +
              "    S  (Scope)               : U = Unchanged | C = Changed\n" +
              "    C  (Confidentiality)     : N = None    | L = Low      | H = High\n" +
              "    I  (Integrity)           : N = None    | L = Low      | H = High\n" +
              "    A  (Availability)        : N = None    | L = Low      | H = High\n\n" +
              "  STEP 2: Compute the CVSS v3.1 Base Score using the official NVD formula.\n" +
              "    - Use the exact numeric weights defined in the CVSS v3.1 specification.\n" +
              "    - Do NOT estimate or guess the score. Calculate it from the vector.\n\n" +
              "  STEP 3: Assign severity ONLY based on the computed score:\n" +
              "    Critical : 9.0 – 10.0\n" +
              "    High     : 7.0 – 8.9\n" +
              "    Medium   : 4.0 – 6.9\n" +
              "    Low      : 0.1 – 3.9\n" +
              "    Info     : 0.0\n\n" +
              "  HARD CONSTRAINTS — VIOLATIONS ARE NOT PERMITTED:\n" +
              "  - The severity label MUST match the CVSS score band exactly. No exceptions.\n" +
              "  - You MUST NOT assign severity based on intuition, impact feel, or context alone.\n" +
              "  - You MUST NOT omit the CVSS vector string for any finding.\n" +
              "  - You MUST NOT report a finding without completing Steps 1–3.\n" +
              "  - The vector string MUST use this exact format: CVSS:3.1/AV:?/AC:?/PR:?/UI:?/S:?/C:?/I:?/A:?\n" +
              "  - Any finding where severity does not match the score band must be corrected before output.\n\n" +
              "- For every issue, provide a Certainty rating using EXACTLY one of: Confirmed | Likely | Possible | Unlikely\n" +
              "    Confirmed : Vulnerability is definitively present from the code alone (e.g. hardcoded secret, direct SQLi).\n" +
              "    Likely    : Strong indicators present; exploitability depends on minor runtime conditions.\n" +
              "    Possible  : Suspicious pattern that could be vulnerable depending on context not visible in the diff.\n" +
              "    Unlikely  : Low-confidence finding; included for awareness, may be a false positive.\n" +
              "- You MUST analyze every single changed line deeply and trace data flows end to end.\n" +
              "- Even if no issues are found, you MUST include a Security Checklist section listing every vulnerability class you checked and one sentence explaining why each was ruled out.\n" +
              "- Never return 0 issues on a diff larger than 100 lines without providing the full checklist.\n\n" +
              "CERTAINTY GUIDANCE:\n" +
              "- Confirmed: You can point to the exact vulnerable line(s) with no ambiguity.\n" +
              "- Likely: The pattern is clearly risky but full exploit depends on calling context or config.\n" +
              "- Possible: Requires assumptions about code outside the diff.\n" +
              "- Unlikely: Edge-case or theoretical risk; flag it but don't alarm the team.\n\n" +
              "OUTPUT FORMAT (follow exactly):\n\n" +
              "## Security Review\n\n" +
              "> **Model**: Claude Haiku 4.5 | **Scan Date**: " + today + "\n\n" +
              "**Summary**: X issue(s) found — Critical N | High N | Medium N | Low N | Info N\n\n" +
              "---\n\n" +
              "### Critical Issues\n" +
              "| Severity | CVSS Score | CVSS Vector | Certainty | File | Line | Issue |\n" +
              "|----------|------------|-------------|-----------|------|------|-------|\n" +
              "| Critical | 9.8 | CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H | Confirmed | path/to/file | 42 | Short title |\n\n" +
              "**[CRIT-1] Issue Title**\n" +
              "- **Severity**: Critical\n" +
              "- **CVSS Base Score**: 9.8\n" +
              "- **CVSS Vector**: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H\n" +
              "- **CVSS Breakdown**:\n" +
              "  - AV: N (Network) — remotely exploitable\n" +
              "  - AC: L (Low) — no special conditions required\n" +
              "  - PR: N (None) — no privileges needed\n" +
              "  - UI: N (None) — no user interaction needed\n" +
              "  - S:  U (Unchanged)\n" +
              "  - C:  H (High) — full confidentiality loss\n" +
              "  - I:  H (High) — full integrity loss\n" +
              "  - A:  H (High) — full availability loss\n" +
              "- **Certainty**: Confirmed\n" +
              "- **Description**: What the risk is and why it is dangerous.\n" +
              "- **CWE**: CWE-XXX - Name\n" +
              "- **OWASP**: A0X:2021 - Category\n" +
              "- **Fix**:\n" +
              "```diff\n" +
              "- insecure code\n" +
              "+ secure code\n" +
              "```\n\n" +
              "---\n\n" +
              "### High Issues\n" +
              "| Severity | CVSS Score | CVSS Vector | Certainty | File | Line | Issue |\n" +
              "|----------|------------|-------------|-----------|------|------|-------|\n" +
              "| High | 7.5 | CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N | Likely | path/to/file | 15 | Short title |\n\n" +
              "**[HIGH-1] Issue Title**\n" +
              "- **Severity**: High\n" +
              "- **CVSS Base Score**: 7.5\n" +
              "- **CVSS Vector**: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N\n" +
              "- **CVSS Breakdown**:\n" +
              "  - AV: N (Network)\n" +
              "  - AC: L (Low)\n" +
              "  - PR: N (None)\n" +
              "  - UI: N (None)\n" +
              "  - S:  U (Unchanged)\n" +
              "  - C:  H (High)\n" +
              "  - I:  N (None)\n" +
              "  - A:  N (None)\n" +
              "- **Certainty**: Likely\n" +
              "- **Description**: What the risk is and why it is dangerous.\n" +
              "- **CWE**: CWE-XXX - Name\n" +
              "- **OWASP**: A0X:2021 - Category\n" +
              "- **Fix**:\n" +
              "```diff\n" +
              "- insecure code\n" +
              "+ secure code\n" +
              "```\n\n" +
              "---\n\n" +
              "### Medium Issues\n" +
              "| Severity | CVSS Score | CVSS Vector | Certainty | File | Line | Issue |\n" +
              "|----------|------------|-------------|-----------|------|------|-------|\n" +
              "| Medium | 5.3 | CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:N | Possible | path/to/file | 30 | Short title |\n\n" +
              "**[MED-1] Issue Title**\n" +
              "- **Severity**: Medium\n" +
              "- **CVSS Base Score**: 5.3\n" +
              "- **CVSS Vector**: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:N\n" +
              "- **CVSS Breakdown**:\n" +
              "  - AV: N (Network)\n" +
              "  - AC: L (Low)\n" +
              "  - PR: N (None)\n" +
              "  - UI: N (None)\n" +
              "  - S:  U (Unchanged)\n" +
              "  - C:  L (Low)\n" +
              "  - I:  N (None)\n" +
              "  - A:  N (None)\n" +
              "- **Certainty**: Possible\n" +
              "- **Description**: What the risk is and why it is dangerous.\n" +
              "- **CWE**: CWE-XXX - Name\n" +
              "- **OWASP**: A0X:2021 - Category\n" +
              "- **Fix**:\n" +
              "```diff\n" +
              "- insecure code\n" +
              "+ secure code\n" +
              "```\n\n" +
              "---\n\n" +
              "### Low Issues\n" +
              "| Severity | CVSS Score | CVSS Vector | Certainty | File | Line | Issue |\n" +
              "|----------|------------|-------------|-----------|------|------|-------|\n" +
              "| Low | 3.1 | CVSS:3.1/AV:N/AC:H/PR:N/UI:R/S:U/C:L/I:N/A:N | Unlikely | path/to/file | 8 | Short title |\n\n" +
              "**[LOW-1] Issue Title**\n" +
              "- **Severity**: Low\n" +
              "- **CVSS Base Score**: 3.1\n" +
              "- **CVSS Vector**: CVSS:3.1/AV:N/AC:H/PR:N/UI:R/S:U/C:L/I:N/A:N\n" +
              "- **CVSS Breakdown**:\n" +
              "  - AV: N (Network)\n" +
              "  - AC: H (High)\n" +
              "  - PR: N (None)\n" +
              "  - UI: R (Required)\n" +
              "  - S:  U (Unchanged)\n" +
              "  - C:  L (Low)\n" +
              "  - I:  N (None)\n" +
              "  - A:  N (None)\n" +
              "- **Certainty**: Unlikely\n" +
              "- **Description**: What the risk is and why it is dangerous.\n" +
              "- **CWE**: CWE-XXX - Name\n" +
              "- **OWASP**: A0X:2021 - Category\n" +
              "- **Fix**:\n" +
              "```diff\n" +
              "- insecure code\n" +
              "+ secure code\n" +
              "```\n\n" +
              "---\n\n" +
              "### Info\n" +
              "| Severity | CVSS Score | CVSS Vector | Certainty | File | Line | Issue |\n" +
              "|----------|------------|-------------|-----------|------|------|-------|\n" +
              "| Info | 0.0 | N/A | Confirmed | path/to/file | 5 | Short title |\n\n" +
              "**[INFO-1] Issue Title**\n" +
              "- **Severity**: Info\n" +
              "- **CVSS Base Score**: 0.0 (Best-practice observation, not exploitable)\n" +
              "- **Certainty**: Confirmed\n" +
              "- **Description**: Brief observation and recommended best practice.\n" +
              "- **CWE**: CWE-XXX - Name (if applicable)\n\n" +
              "---\n\n" +
              "### Security Checklist\n" +
              "*(Always include this section even if no issues found)*\n\n" +
              "| Vulnerability Class | Status | CVSS Range if Found | Notes |\n" +
              "|---------------------|--------|---------------------|-------|\n" +
              "| SQL Injection (SQLi) | Not Found | Critical (9.0–10.0) | No raw SQL queries with user input detected |\n" +
              "| Cross-Site Scripting (XSS) | Not Found | High (7.0–8.9) | No unsanitized output to HTML detected |\n" +
              "| Server-Side Request Forgery (SSRF) | Not Found | High (7.0–8.9) | No outbound requests with user-controlled URLs |\n" +
              "| Authentication / Auth Bypass | Not Found | Critical (9.0–10.0) | Auth checks appear intact |\n" +
              "| Hardcoded Secrets / API Keys | Not Found | Critical (9.0–10.0) | No secrets or tokens found in diff |\n" +
              "| Insecure Direct Object Reference (IDOR) | Not Found | High (7.0–8.9) | Access control checks present |\n" +
              "| Remote Code Execution (RCE) | Not Found | Critical (9.0–10.0) | No eval or shell exec with user input |\n" +
              "| Cross-Site Request Forgery (CSRF) | Not Found | Medium (4.0–6.9) | CSRF tokens in place |\n" +
              "| Open Redirect | Not Found | Medium (4.0–6.9) | Redirect targets are validated |\n" +
              "| Weak Cryptography | Not Found | Medium (4.0–6.9) | No weak hash or cipher usage |\n" +
              "| Broken Access Control | Not Found | High (7.0–8.9) | Role checks appear correct |\n" +
              "| Supply Chain / Dependency Risk | Not Found | High (7.0–8.9) | No suspicious new dependencies |\n\n" +
              "---\n\n" +
              "> Auto-generated review. Always verify findings manually before acting. CVSS scores are calculated strictly from the CVSS v3.1 Base Score formula using the vector metrics above.\n\n" +
              "FINAL CHECKLIST BEFORE OUTPUT — YOU MUST VERIFY EACH POINT:\n" +
              "- [ ] Every finding has a complete CVSS vector: CVSS:3.1/AV:?/AC:?/PR:?/UI:?/S:?/C:?/I:?/A:?\n" +
              "- [ ] Every metric uses only the allowed values: AV(N/A/L/P) AC(L/H) PR(N/L/H) UI(N/R) S(U/C) C(N/L/H) I(N/L/H) A(N/L/H)\n" +
              "- [ ] Every CVSS score was calculated from the vector, not guessed\n" +
              "- [ ] Every severity label matches the score band: Critical(9-10) High(7-8.9) Medium(4-6.9) Low(0.1-3.9) Info(0.0)\n" +
              "- [ ] Every finding includes a CVSS Breakdown section listing all 8 metrics with their chosen value and label\n" +
              "- [ ] No severity was assigned by intuition or overridden after calculation\n" +
              "- [ ] Security Checklist section is present and filled with real observations\n" +
              "- [ ] Certainty is included for every finding\n\n" +
              "- Omit any severity section entirely if zero issues at that level.\n" +
              "- Never print empty tables.\n" +
              "- Number issues per group: CRIT-1, CRIT-2, HIGH-1, HIGH-2, MED-1, LOW-1, INFO-1 etc.\n\n" +
              "PR changes to analyze:\n" +
              truncatedDiff;

            try {
              console.log(`Calling Claude Haiku 4.5...`);

              // FIX 9: Timeout on the main Anthropic API call.
              const controller = new AbortController();
              // Allow generous time for the full security review response.
              const timeoutId = setTimeout(() => controller.abort(), 120000);

              let response;
              try {
                response = await fetch("https://api.anthropic.com/v1/messages", {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    "x-api-key": process.env.ANTHROPIC_API_KEY,
                    "anthropic-version": "2023-06-01"
                  },
                  body: JSON.stringify({
                    model: MODEL,
                    max_tokens: MAX_TOKENS,
                    // FIX 5: Removed temperature parameter. The Anthropic API
                    // does not guarantee support for non-zero temperature on
                    // every model/version combination and the security-review
                    // use case benefits from fully deterministic output anyway.
                    system: systemPrompt,
                    messages: [
                      { role: "user", content: userPrompt }
                    ]
                  }),
                  signal: controller.signal
                });
              } finally {
                clearTimeout(timeoutId);
              }

              if (!response.ok) {
                const errorBody = await response.json().catch(() => ({}));
                const errorType = errorBody?.error?.type ?? "";
                const errorMsg  = errorBody?.error?.message ?? JSON.stringify(errorBody);

                if (response.status === 429 || errorType === "rate_limit_error") {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body: [
                      "## Security Review — Skipped ⚠️",
                      "",
                      "> **Reason**: Anthropic API rate limit or quota exceeded during scan.",
                      "> Reported to security team."
                    ].join("\n")
                  });

                  await sendSlackAlert(
                    `⚠️ *Security Review Skipped — Anthropic Rate Limit Hit During Scan*\n` +
                    `> *Repo*: ${repoLabel}\n` +
                    `> *PR*: <${prLink}|#${context.issue.number}>\n` +
                    `> *Reason*: Rate limit or quota exceeded during scan.\n` +
                    `> *Action*: Check your Anthropic API plan or rotate the \`ANTHROPIC_API_KEY\` secret.`
                  );

                  core.setFailed("Security review skipped: Anthropic API rate limit exceeded.");
                  return;
                }

                await sendSlackAlert(
                  `🔴 *Security Review Failed — Anthropic API Error During Scan*\n` +
                  `> *Repo*: ${repoLabel}\n` +
                  `> *PR*: <${prLink}|#${context.issue.number}>\n` +
                  `> *HTTP Status*: ${response.status}\n` +
                  `> *Detail*: \`${errorMsg}\``
                );

                core.setFailed(`Anthropic API error ${response.status}: ${errorMsg}`);
                return;
              }

              const data = await response.json();

              // FIX 7: Scan all content blocks for a text block instead of
              // blindly assuming index 0 is always text. Tool-use responses or
              // multi-block responses would previously produce an empty string
              // and trigger the "empty response" error path silently.
              const reviewText = (data?.content ?? [])
                .filter(block => block.type === "text")
                .map(block => block.text)
                .join("\n")
                .trim();

              if (!reviewText) {
                await sendSlackAlert(
                  `🔴 *Security Review Failed — Empty Response from Claude Haiku*\n` +
                  `> *Repo*: ${repoLabel}\n` +
                  `> *PR*: <${prLink}|#${context.issue.number}>\n` +
                  `> *Detail*: Model returned no text content.`
                );

                core.setFailed(`Unexpected Anthropic response structure: ${JSON.stringify(data)}`);
                return;
              }

              const usage = data.usage || {};
              console.log('─── Token Usage ───────────────────────────');
              console.log(`  Input  tokens: ${usage.input_tokens  ?? 'N/A'}`);
              console.log(`  Output tokens: ${usage.output_tokens ?? 'N/A'}`);
              console.log('───────────────────────────────────────────');

              const outputTooShort = (usage.output_tokens ?? 0) < 300;
              if (outputTooShort) {
                console.warn('WARNING: Output tokens very low — model may not have done a full review!');
              }

              // ─── Parse findings ────────────────────────────────────
              // FIX 6: Regex with the /g flag retains lastIndex on the regex
              // object between calls in the same process context. Create a
              // fresh regex on each parse rather than relying on a module-level
              // constant that would produce wrong matches on subsequent runs.
              const severityGroups = { Critical: [], High: [], Medium: [], Low: [], Info: [] };
              const findingRegex = /\*\*\[(CRIT|HIGH|MED|LOW|INFO)-\d+\]\s(.+?)\*\*/g;
              const severityMap  = { CRIT: 'Critical', HIGH: 'High', MED: 'Medium', LOW: 'Low', INFO: 'Info' };
              let match;
              while ((match = findingRegex.exec(reviewText)) !== null) {
                const sev = severityMap[match[1]];
                if (sev) severityGroups[sev].push(match[2].trim());
              }

              const totalFindings = Object.values(severityGroups).reduce((s, a) => s + a.length, 0);

              // ─── Slack findings summary ────────────────────────────
              // FIX 8: Removed the separate duplicate truncation Slack alert
              // that fired after the summary. The truncation warning is already
              // included in summaryLines below, so the second alert was pure
              // noise causing duplicate notifications in the channel.
              const summaryLines = [
                totalFindings === 0
                  ? `✅ *Security Review Complete — No Findings*`
                  : `🔎 *Security Review Complete — ${totalFindings} Finding(s) Found*`,
                `> *Repo*: ${repoLabel}`,
                `> *PR*: <${prLink}|#${context.issue.number}>`,
                `> *Model*: \`${MODEL}\``,
                `> *Scanned*: ${today}`,
                `> *Summary*: Critical: ${severityGroups.Critical.length} | High: ${severityGroups.High.length} | Medium: ${severityGroups.Medium.length} | Low: ${severityGroups.Low.length} | Info: ${severityGroups.Info.length}`,
              ];

              if (totalFindings > 0) {
                summaryLines.push('');
                summaryLines.push('*Findings:*');
                summaryLines.push('```');
                summaryLines.push('Severity   | Finding');
                summaryLines.push('-----------|' + '-'.repeat(50));
                for (const [sev, names] of Object.entries(severityGroups)) {
                  for (const name of names) {
                    summaryLines.push(`${sev.padEnd(10)} | ${name}`);
                  }
                }
                summaryLines.push('```');
              }

              if (wasTruncated)   summaryLines.push(`> ⚠️ *Warning*: Diff was truncated — some changes were NOT reviewed. Consider splitting this PR.`);
              if (outputTooShort) summaryLines.push(`> ⚠️ *Warning*: Model output was very short — review may be incomplete. Re-run or review manually.`);

              await sendSlackAlert(summaryLines.join('\n'));

              // ─── Post PR comment ───────────────────────────────────
              // FIX 10: Replaced the fragile filter(Boolean) footer array with
              // explicit conditional pushes so empty strings from ternaries
              // never accidentally collapse intended lines. The previous pattern
              // relied on '' being falsy, which was correct by accident and
              // would break if any line became a single space or similar.
              const footerLines = ['', '---'];
              if (wasTruncated) {
                footerLines.push('> ⚠️ WARNING: Diff was truncated — some changes were NOT reviewed. Consider splitting this PR.');
              }
              if (outputTooShort) {
                footerLines.push('> ⚠️ WARNING: Model output was very short — review may be incomplete. Re-run or review manually.');
              }
              footerLines.push(`> 🤖 **Model used**: \`${MODEL}\``);
              footerLines.push(`> 📊 **Tokens** — Input: \`${usage.input_tokens ?? 'N/A'}\` | Output: \`${usage.output_tokens ?? 'N/A'}\``);
              footerLines.push(`> 📅 **Scanned**: ${today}`);
              footerLines.push(`> 🔢 **Scoring**: CVSS v3.1 Base Score computed strictly from AV/AC/PR/UI/S/C/I/A vector metrics | Severity derived from score band only`);
              const footer = footerLines.join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: reviewText + footer
              });

              console.log(`Security review posted successfully on PR #${context.issue.number}`);

            } catch (error) {
              await sendSlackAlert(
                `🔴 *Security Review Failed — Script Crash*\n` +
                `> *Repo*: ${repoLabel}\n` +
                `> *PR*: <${prLink}|#${context.issue.number}>\n` +
                `> *Error*: ${error.message}`
              );

              core.setFailed(`Script error: ${error.message}\n${error.stack}`);
            }
