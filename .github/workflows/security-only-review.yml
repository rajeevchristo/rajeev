name: Security-Only PR Review (OpenAI GPT-4o)
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Get PR diff
        run: git diff --no-color --unified=2 origin/${{ github.base_ref }}...HEAD > diff.txt

      - name: Run Security-Only Review with GPT-4o
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const rawDiff = fs.readFileSync('diff.txt', 'utf8');

            // ─── CONFIG ────────────────────────────────────────────────
            const MAX_DIFF_CHARS        = 120000;
            const MAX_COMPLETION_TOKENS = 8000;

            // GPT-4o first — it has the reasoning depth needed for security
            // analysis. gpt-4o-mini is a fallback only; expect lower recall.
            const MODELS = [
              { name: 'gpt-4o',      useCompletionTokens: false },
              { name: 'gpt-4o-mini', useCompletionTokens: false }
            ];
            // ───────────────────────────────────────────────────────────

            const wasTruncated = rawDiff.length > MAX_DIFF_CHARS;

            const truncatedDiff = wasTruncated
              ? rawDiff.slice(0, MAX_DIFF_CHARS) + '\n\n[... diff truncated due to size ...]'
              : rawDiff;

            if (!truncatedDiff.trim()) {
              console.log('No diff found. Skipping security review.');
              return;
            }

            console.log(`Raw diff size  : ${rawDiff.length} chars`);
            console.log(`Sent to model  : ${truncatedDiff.length} chars`);
            console.log(`Input  tokens (approx): ~${Math.round(truncatedDiff.length / 4)}`);
            console.log(`Output tokens (max):     ${MAX_COMPLETION_TOKENS}`);
            if (wasTruncated) {
              console.log('WARNING: Diff was truncated — some changes were NOT reviewed!');
            }

            const today = new Date().toISOString().split('T')[0];

            // ─── SYSTEM PROMPT ─────────────────────────────────────────
            // Focused on deep analysis — no easy escape hatch, no token floor
            // that could be gamed. The model must justify a clean result.
            const systemPrompt =
              "You are an expert Application Security Engineer with 15+ years of experience in offensive security, secure code review, and vulnerability research. " +
              "Your task is to perform a deep, line-by-line security audit of a code diff. " +
              "You MUST trace every data flow end to end — from user-controlled input to every sink. " +
              "You are not allowed to assume code is safe without explicitly reasoning through why. " +
              "If you find no issues, you MUST still reason through each vulnerability class and explain why it does not apply to this diff specifically. " +
              "A lazy or shallow review is a security failure.";

            // ─── USER PROMPT ───────────────────────────────────────────
            // Key changes vs previous version:
            //   1. "No issues" escape hatch appears ONCE only, at the end.
            //   2. Model is required to show its reasoning even for clean diffs.
            //   3. temperature stays low but reasoning requirement counteracts laziness.
            const prompt =
              "Perform a thorough security audit of the PR diff below.\n\n" +

              "STRICT RULES:\n" +
              "- Report ONLY real security vulnerabilities: OWASP Top 10, CWE, injection, SSRF, auth bypass, broken access control, secrets leakage, logic flaws, data-flow issues, supply-chain risks.\n" +
              "- NEVER comment on code style, performance, tests, or maintainability.\n" +
              "- Trace every user-controlled input to every possible sink. Do not skip any changed line.\n" +
              "- Assume the worst-case attacker: no trust in any input, headers, query params, env vars, or file contents.\n" +
              "- Do NOT pad with low-confidence noise. Only report what you can justify.\n\n" +

              "SEVERITY DEFINITIONS:\n" +
              "- CRITICAL : Immediate exploitation possible — RCE, SQLi, hardcoded secrets, auth bypass.\n" +
              "- HIGH     : Significant impact, likely exploitable — SSRF, IDOR, privilege escalation, XSS.\n" +
              "- MEDIUM   : Moderate impact, needs specific conditions — open redirect, weak crypto, missing rate-limit, CSRF.\n" +
              "- LOW      : Minor risk, limited impact — verbose errors, missing security headers, overly broad CORS.\n\n" +

              "CERTAINTY DEFINITIONS:\n" +
              "- Confirmed         : Vulnerability is clearly present and exploitable as written.\n" +
              "- Suspected         : Strong indication; requires minor assumptions about surrounding code.\n" +
              "- Unverified concern: Possible risk but depends on context not visible in the diff.\n\n" +

              "OUTPUT FORMAT — use this exact structure for each issue found:\n\n" +
              "## Security Review\n\n" +
              "> **Model**: GPT-4o | **Scan Date**: " + today + "\n\n" +
              "---\n\n" +
              "* Issue: <title>\n" +
              "* CVSS: <score e.g. 9.8 (Critical) — AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H>\n" +
              "* Severity: CRITICAL / HIGH / MEDIUM / LOW\n" +
              "* Certainty: Confirmed / Suspected / Unverified concern\n" +
              "* Location: <file path>:<line number(s)>\n" +
              "* Exploit path: <one sentence — how this is exploited in practice>\n" +
              "* Fix:\n" +
              "```diff\n" +
              "- insecure code\n" +
              "+ secure code\n" +
              "```\n\n" +
              "---\n\n" +
              "*(Repeat one block per issue. Do NOT add extra prose, summaries, section headers, or tables outside these blocks.)*\n\n" +
              "> Auto-generated review. Always verify findings manually before acting.\n\n" +

              "FIELD RULES:\n" +
              "- Use EXACTLY these field names: Issue, CVSS, Severity, Certainty, Location, Exploit path, Fix.\n" +
              "- Separate each issue block with a `---` divider.\n" +
              "- Do NOT add section headers (e.g. 'Critical Issues'), summary tables, or checklists.\n" +
              "- Only if you find ZERO issues after exhaustive analysis, respond with exactly one line:\n" +
              "  No security issues identified in this diff.\n\n" +

              "PR diff to analyze:\n" +
              truncatedDiff;

            try {
              let response, usedModel;

              for (const model of MODELS) {
                console.log(`Trying model: ${model.name}`);

                const tokenParam = model.useCompletionTokens
                  ? { max_completion_tokens: MAX_COMPLETION_TOKENS }
                  : { max_tokens: MAX_COMPLETION_TOKENS };

                response = await fetch("https://api.openai.com/v1/chat/completions", {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${process.env.OPENAI_API_KEY}`
                  },
                  body: JSON.stringify({
                    model: model.name,
                    messages: [
                      { role: "system", content: systemPrompt },
                      { role: "user",   content: prompt       }
                    ],
                    temperature: 0.2,   // slightly higher than 0.1 — reduces lazy shortcutting
                    ...tokenParam
                  })
                });

                if (response.ok) {
                  usedModel = model.name;
                  console.log(`Using model: ${usedModel}`);
                  break;
                }

                const errorBody = await response.text();
                console.warn(`Model ${model.name} failed (HTTP ${response.status}): ${errorBody}`);

                if (response.status !== 404 && response.status !== 400) {
                  core.setFailed(`OpenAI API error ${response.status}: ${errorBody}`);
                  return;
                }
              }

              if (!response || !response.ok) {
                core.setFailed('All model fallbacks exhausted. Could not complete security review.');
                return;
              }

              const data = await response.json();

              if (!data.choices?.[0]?.message?.content) {
                core.setFailed(`Unexpected OpenAI response structure: ${JSON.stringify(data)}`);
                return;
              }

              const reviewText = data.choices[0].message.content;

              // Detect the intentional clean result — do NOT warn about token
              // count in this case; the short response is correct behaviour.
              const NO_ISSUES_PHRASE = 'No security issues identified in this diff.';
              const isCleanResult = reviewText.trim() === NO_ISSUES_PHRASE;

              const usage = data.usage || {};
              console.log('─── Token Usage ───────────────────────────');
              console.log(`  Prompt (input)     : ${usage.prompt_tokens     ?? 'N/A'} tokens`);
              console.log(`  Completion (output): ${usage.completion_tokens ?? 'N/A'} tokens`);
              console.log(`  Total              : ${usage.total_tokens      ?? 'N/A'} tokens`);
              console.log('───────────────────────────────────────────');

              // Warn only when output is genuinely short AND it's not the
              // expected clean-result phrase — that combination means the model
              // returned something unexpected, not a legitimate clean scan.
              const outputTooShort = !isCleanResult && (usage.completion_tokens ?? 0) < 300;
              if (outputTooShort) {
                console.warn('WARNING: Output tokens very low — model may not have done a full review!');
              }

              // Flag when gpt-4o-mini was used as fallback — lower recall expected.
              const usedFallback = usedModel !== 'gpt-4o';
              if (usedFallback) {
                console.warn(`WARNING: Fell back to ${usedModel} — security recall will be lower than GPT-4o.`);
              }

              const footer = [
                '',
                '---',
                wasTruncated
                  ? '> ⚠️ **WARNING**: Diff was truncated — some changes were NOT reviewed. Consider splitting this PR.' : '',
                outputTooShort
                  ? '> ⚠️ **WARNING**: Model output was very short — review may be incomplete. Re-run or review manually.' : '',
                usedFallback
                  ? `> ⚠️ **WARNING**: Primary model unavailable. Used fallback \`${usedModel}\` — expect lower vulnerability detection.` : '',
                `> 🤖 **Model used**: \`${usedModel}\``,
                `> 📊 **Tokens** — Input: \`${usage.prompt_tokens ?? 'N/A'}\` | Output: \`${usage.completion_tokens ?? 'N/A'}\` | Total: \`${usage.total_tokens ?? 'N/A'}\``,
                `> 📅 **Scanned**: ${today}`
              ].filter(Boolean).join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: reviewText + footer
              });

              console.log(`Security review posted successfully on PR #${context.issue.number}`);

            } catch (error) {
              core.setFailed(`Script error: ${error.message}\n${error.stack}`);
            }
