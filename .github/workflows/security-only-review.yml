name: Security-Only PR Review (OpenAI GPT-5.4-mini)
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}
      - name: Get PR diff
        run: git diff --no-color origin/${{ github.base_ref }}...HEAD > diff.txt
      - name: Validate model string
        run: |
          echo "Checking available GPT-5.4 models..."
          curl -s https://api.openai.com/v1/models \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            | jq '[.data[].id | select(test("5\\.4"; "i"))]'
      - name: Run Security-Only Review with GPT-5.4-mini
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('diff.txt', 'utf8');

            // Truncate diff if too large to avoid token limits
            const MAX_DIFF_CHARS = 28000;
            const truncatedDiff = diff.length > MAX_DIFF_CHARS
              ? diff.slice(0, MAX_DIFF_CHARS) + '\n\n[... diff truncated due to size ...]'
              : diff;

            if (!truncatedDiff.trim()) {
              console.log('No diff found. Skipping security review.');
              return;
            }

            try {
              const prompt = `You are a senior Application Security Engineer.
            Your ONLY job is to analyze the code changes below and report security issues.

            STRICT RULES:
            - Report ONLY real security vulnerabilities (OWASP Top 10, CWE, injection, SSRF, auth bypass, broken access control, secrets leakage, logic flaws, data-flow issues, supply-chain risks, etc.).
            - NEVER comment on code style, performance, tests, maintainability, or anything non-security.
            - If no security issues are found, reply with exactly this one line: "✅ No security issues detected in this PR."
            - Classify every issue using EXACTLY one of these five severity levels: Critical, High, Medium, Low, Info.

            SEVERITY DEFINITIONS:
            - 🔴 Critical: Immediate exploitation possible, full system/data compromise (e.g. RCE, SQLi, hardcoded secrets, auth bypass).
            - 🟠 High: Significant impact, likely exploitable (e.g. SSRF, IDOR, privilege escalation, XSS in sensitive context).
            - 🟡 Medium: Moderate impact, requires specific conditions (e.g. open redirect, weak crypto, missing rate-limiting, CSRF).
            - 🔵 Low: Minor risk, limited impact (e.g. verbose error messages, missing security headers, overly broad CORS).
            - ℹ️ Info: Best-practice observations with negligible direct risk (e.g. dependency version pinning, minor config notes).

            OUTPUT FORMAT (use this exact structure):

            ## 🔐 Security Review

            > **Model**: GPT-5.4-mini | **Scan Date**: {{DATE}}

            **Summary**: X security issue(s) found — 🔴 N Critical | 🟠 N High | 🟡 N Medium | 🔵 N Low | ℹ️ N Info
            *(or "✅ No issues found" if none)*

            ---

            ### 🔴 Critical Issues
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | 🔴 Critical | path/to/file.py | 42 | Short title |

            **[CRIT-1] <Issue Title>**
            - **Description**: Clear explanation of the risk and why it is dangerous.
            - **CWE**: CWE-XXX – Name
            - **OWASP**: A0X:2021 – Category
            - **Fix Suggestion**:
            \`\`\`diff
            - Insecure code here
            + Secure code here
            \`\`\`

            ---

            ### 🟠 High Issues
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | 🟠 High | path/to/file.py | 15 | Short title |

            **[HIGH-1] <Issue Title>**
            - **Description**: Clear explanation of the risk and why it is dangerous.
            - **CWE**: CWE-XXX – Name
            - **OWASP**: A0X:2021 – Category
            - **Fix Suggestion**:
            \`\`\`diff
            - Insecure code here
            + Secure code here
            \`\`\`

            ---

            ### 🟡 Medium Issues
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | 🟡 Medium | path/to/file.py | 30 | Short title |

            **[MED-1] <Issue Title>**
            - **Description**: Clear explanation of the risk and why it is dangerous.
            - **CWE**: CWE-XXX – Name
            - **OWASP**: A0X:2021 – Category
            - **Fix Suggestion**:
            \`\`\`diff
            - Insecure code here
            + Secure code here
            \`\`\`

            ---

            ### 🔵 Low Issues
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | 🔵 Low | path/to/file.py | 8 | Short title |

            **[LOW-1] <Issue Title>**
            - **Description**: Clear explanation of the risk and why it is dangerous.
            - **CWE**: CWE-XXX – Name
            - **OWASP**: A0X:2021 – Category
            - **Fix Suggestion**:
            \`\`\`diff
            - Insecure code here
            + Secure code here
            \`\`\`

            ---

            ### ℹ️ Info
            | Severity | File | Line | Issue |
            |----------|------|------|-------|
            | ℹ️ Info | path/to/file.py | 5 | Short title |

            **[INFO-1] <Issue Title>**
            - **Description**: Brief observation and recommended best practice.
            - **CWE**: CWE-XXX – Name *(if applicable)*

            ---

            > ⚠️ *This review was generated automatically. Always verify findings manually before acting.*

            IMPORTANT RULES FOR OUTPUT:
            - Omit any severity section entirely if there are zero issues at that level.
            - Do not print empty tables.
            - Replace {{DATE}} with today's date in YYYY-MM-DD format.
            - Number issues sequentially per severity group: CRIT-1, CRIT-2, HIGH-1, HIGH-2, etc.

            Now analyze the following PR changes:
            ${truncatedDiff}`;

              // Step 1: Try gpt-5.4-mini, fall back to gpt-4o-mini if unavailable
              const MODELS = ['gpt-5.4-mini', 'gpt-4o-mini'];
              let response, usedModel;

              for (const model of MODELS) {
                console.log(`Trying model: ${model}`);
                response = await fetch("https://api.openai.com/v1/chat/completions", {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${process.env.OPENAI_API_KEY}`
                  },
                  body: JSON.stringify({
                    model: model,
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.0,
                    max_tokens: 4000
                  })
                });

                if (response.ok) {
                  usedModel = model;
                  break;
                }

                const errorBody = await response.text();
                console.warn(`Model ${model} failed (${response.status}): ${errorBody}`);

                // If it's not a model-not-found error, don't retry
                if (response.status !== 404 && response.status !== 400) {
                  core.setFailed(`OpenAI API error ${response.status}: ${errorBody}`);
                  return;
                }
              }

              if (!response || !response.ok) {
                core.setFailed('All model fallbacks exhausted. Could not complete security review.');
                return;
              }

              const data = await response.json();

              if (!data.choices || !data.choices[0] || !data.choices[0].message) {
                core.setFailed(`Unexpected OpenAI response: ${JSON.stringify(data)}`);
                return;
              }

              const reviewText = data.choices[0].message.content;

              // Append model info footer
              const footer = `\n\n---\n> 🤖 *Reviewed using model: \`${usedModel}\` | Tokens used: ${data.usage?.total_tokens ?? 'N/A'}*`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: reviewText + footer
              });

              console.log(`Security review posted successfully using ${usedModel}.`);

            } catch (error) {
              core.setFailed(`Script error: ${error.message}`);
            }
