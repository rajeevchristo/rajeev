name: Security-Only PR Review (Claude Haiku 4.5)
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch and generate diff
        run: |
          git fetch origin "${{ github.base_ref }}" || {
            echo "::error::Failed to fetch base branch ${{ github.base_ref }}"
            exit 1
          }
          git diff --no-color --unified=2 "origin/${{ github.base_ref }}...HEAD" > diff.txt
          echo "Diff size: $(wc -c < diff.txt) bytes"

      - name: Check Anthropic API access
        id: quota_check
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sendSlackAlert = async (message) => {
              const webhookUrl = process.env.SLACK_WEBHOOK;
              if (!webhookUrl) {
                console.warn("SLACK_WEBHOOK secret is not set — skipping Slack alert.");
                return;
              }
              try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                await fetch(webhookUrl, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ text: message }),
                  signal: controller.signal
                });
                clearTimeout(timeoutId);
              } catch (slackErr) {
                console.warn(`Slack alert failed: ${slackErr.message}`);
              }
            };

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);
            let response;
            try {
              response = await fetch("https://api.anthropic.com/v1/messages", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "x-api-key": process.env.ANTHROPIC_API_KEY,
                  "anthropic-version": "2023-06-01"
                },
                body: JSON.stringify({
                  model: "claude-haiku-4-5",
                  max_tokens: 1,
                  messages: [{ role: "user", content: "ping" }]
                }),
                signal: controller.signal
              });
            } catch (fetchErr) {
              clearTimeout(timeoutId);
              await sendSlackAlert(
                `🔴 *Security Review Failed — Anthropic API Unreachable*\n` +
                `> *Repo*: ${context.repo.owner}/${context.repo.repo}\n` +
                `> *PR*: #${context.issue.number}\n` +
                `> *Reason*: Network error or timeout during API ping.\n` +
                `> *Detail*: \`${fetchErr.message}\``
              );
              core.setFailed(`Anthropic API unreachable: ${fetchErr.message}`);
              return;
            }
            clearTimeout(timeoutId);

            if (response.ok) {
              console.log("Anthropic API check passed.");
              core.setOutput("quota_ok", "true");
              return;
            }

            const errorBody = await response.json().catch(() => ({}));
            const errorType = errorBody?.error?.type ?? "";
            const errorMsg  = errorBody?.error?.message ?? JSON.stringify(errorBody);

            console.warn(`Anthropic API check failed (HTTP ${response.status}): ${errorMsg}`);
            core.setOutput("quota_ok", "false");

            if (response.status === 429 || errorType === "rate_limit_error") {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  "## Security Review — Skipped ⚠️",
                  "",
                  "> **Reason**: Anthropic API rate limit or quota exceeded.",
                  "> Reported to security team."
                ].join("\n")
              });
              await sendSlackAlert(
                `⚠️ *Security Review Skipped — Anthropic API Rate Limit / Quota Exceeded*\n` +
                `> *Repo*: ${context.repo.owner}/${context.repo.repo}\n` +
                `> *PR*: #${context.issue.number}\n` +
                `> *Reason*: Anthropic API returned rate limit or quota error.\n` +
                `> *Action*: Check your Anthropic API plan or rotate the \`ANTHROPIC_API_KEY\` secret.`
              );
              core.setFailed("Security review skipped: Anthropic API rate limit or quota exceeded.");
            } else if (response.status === 401 || errorType === "authentication_error") {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  "## Security Review — Skipped ⚠️",
                  "",
                  "> **Reason**: Anthropic API key is invalid or missing.",
                  "> Reported to security team."
                ].join("\n")
              });
              await sendSlackAlert(
                `🔴 *Security Review Failed — Invalid Anthropic API Key*\n` +
                `> *Repo*: ${context.repo.owner}/${context.repo.repo}\n` +
                `> *PR*: #${context.issue.number}\n` +
                `> *Reason*: API key is invalid or not set.\n` +
                `> *Action*: Rotate the \`ANTHROPIC_API_KEY\` secret in repository settings.`
              );
              core.setFailed("Security review skipped: Anthropic API key invalid.");
            } else {
              await sendSlackAlert(
                `🔴 *Security Review Failed — Anthropic API Check Error*\n` +
                `> *Repo*: ${context.repo.owner}/${context.repo.repo}\n` +
                `> *PR*: #${context.issue.number}\n` +
                `> *Reason*: Unexpected error during API check (HTTP ${response.status}).\n` +
                `> *Detail*: \`${errorMsg}\``
              );
              core.setFailed(`Anthropic API check failed with unexpected error (HTTP ${response.status}).`);
            }

      - name: Run Security-Only Review with Claude Haiku 4.5
        if: steps.quota_check.outputs.quota_ok == 'true'
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // ─── CONFIG ────────────────────────────────────────────────
            const MAX_DIFF_CHARS = 120000;
            const MAX_TOKENS     = 8000;
            const MODEL          = "claude-haiku-4-5";
            // ───────────────────────────────────────────────────────────

            // ─── CVSS v3.1 DETERMINISTIC CALCULATOR ───────────────────
            // Score and severity are NEVER assigned by the model.
            // The model outputs only the 8 metric values (A-Z letters).
            // This function computes the score from those letters exactly
            // per the CVSS v3.1 specification — same input always produces
            // the same output, eliminating LLM arithmetic variance entirely.
            function computeCVSS31(m) {
              const AV   = { N: 0.85, A: 0.62, L: 0.55, P: 0.20 }[m.AV];
              const AC   = { L: 0.77, H: 0.44 }[m.AC];
              const PR_U = { N: 0.85, L: 0.62, H: 0.27 }[m.PR];
              const PR_C = { N: 0.85, L: 0.68, H: 0.50 }[m.PR];
              const UI   = { N: 0.85, R: 0.62 }[m.UI];
              const S    = m.S;
              const PR   = S === 'C' ? PR_C : PR_U;
              const C    = { N: 0.00, L: 0.22, H: 0.56 }[m.C];
              const I    = { N: 0.00, L: 0.22, H: 0.56 }[m.I];
              const A    = { N: 0.00, L: 0.22, H: 0.56 }[m.A];

              const ISCBase = 1 - (1 - C) * (1 - I) * (1 - A);
              const ISC     = S === 'U'
                ? 6.42 * ISCBase
                : 7.52 * (ISCBase - 0.029) - 3.25 * Math.pow(ISCBase - 0.02, 15);

              if (ISC <= 0) return 0.0;

              const Exploitability = 8.22 * AV * AC * PR * UI;
              const raw = S === 'U'
                ? Math.min(ISC + Exploitability, 10)
                : Math.min(1.08 * (ISC + Exploitability), 10);

              return Math.ceil(raw * 10) / 10;
            }

            function getSeverity(score) {
              if (score >= 9.0) return 'Critical';
              if (score >= 7.0) return 'High';
              if (score >= 4.0) return 'Medium';
              if (score >  0.0) return 'Low';
              return 'Info';
            }

            function getVector(m) {
              return `CVSS:3.1/AV:${m.AV}/AC:${m.AC}/PR:${m.PR}/UI:${m.UI}/S:${m.S}/C:${m.C}/I:${m.I}/A:${m.A}`;
            }

            // ─── CWE CANONICAL VECTOR LOOKUP TABLE ────────────────────
            // For well-known CWEs we use a pre-defined canonical vector
            // rather than relying on the model's metric selection.
            // This gives near-100% score consistency for these CWE types
            // because the vector is fixed and the calculator is deterministic.
            // The model only needs to correctly identify the CWE — which it
            // does reliably — and the rest is deterministic code.
            const CWE_VECTORS = {
              // Injection
              'CWE-89':  { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'H', A:'H' }, // SQL Injection
              'CWE-77':  { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'H', A:'H' }, // Command Injection
              'CWE-78':  { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'H', A:'H' }, // OS Command Injection
              'CWE-917': { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'H', A:'H' }, // Expression Language Injection
              'CWE-94':  { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'H', A:'H' }, // Code Injection
              'CWE-611': { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'H', A:'N' }, // XXE
              // XSS
              'CWE-79':  { AV:'N', AC:'L', PR:'N', UI:'R', S:'C', C:'L', I:'L', A:'N' }, // XSS
              'CWE-80':  { AV:'N', AC:'L', PR:'N', UI:'R', S:'C', C:'L', I:'L', A:'N' }, // Basic XSS
              // SSRF / Request Forgery
              'CWE-918': { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'N', A:'N' }, // SSRF
              'CWE-352': { AV:'N', AC:'L', PR:'N', UI:'R', S:'U', C:'H', I:'H', A:'H' }, // CSRF
              // Auth & Access Control
              'CWE-287': { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'H', A:'H' }, // Improper Authentication
              'CWE-306': { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'H', A:'H' }, // Missing Authentication
              'CWE-639': { AV:'N', AC:'L', PR:'L', UI:'N', S:'U', C:'H', I:'H', A:'N' }, // IDOR
              'CWE-862': { AV:'N', AC:'L', PR:'L', UI:'N', S:'U', C:'H', I:'H', A:'N' }, // Missing Authorization
              'CWE-863': { AV:'N', AC:'L', PR:'L', UI:'N', S:'U', C:'H', I:'H', A:'N' }, // Incorrect Authorization
              // Secrets / Cryptography
              'CWE-798': { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'H', A:'H' }, // Hardcoded Credentials
              'CWE-259': { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'H', A:'H' }, // Hardcoded Password
              'CWE-321': { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'H', A:'H' }, // Hardcoded Crypto Key
              'CWE-326': { AV:'N', AC:'H', PR:'N', UI:'N', S:'U', C:'H', I:'N', A:'N' }, // Weak Crypto
              'CWE-327': { AV:'N', AC:'H', PR:'N', UI:'N', S:'U', C:'H', I:'N', A:'N' }, // Broken Crypto Algorithm
              'CWE-330': { AV:'N', AC:'H', PR:'N', UI:'N', S:'U', C:'H', I:'N', A:'N' }, // Weak Random
              // Path / File
              'CWE-22':  { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'H', A:'N' }, // Path Traversal
              'CWE-434': { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'H', A:'H' }, // Unrestricted File Upload
              // Redirect / Open Redirect
              'CWE-601': { AV:'N', AC:'L', PR:'N', UI:'R', S:'U', C:'L', I:'L', A:'N' }, // Open Redirect
              // Deserialization / RCE
              'CWE-502': { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'H', I:'H', A:'H' }, // Deserialization
              'CWE-20':  { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'L', I:'L', A:'N' }, // Improper Input Validation
              // Info Disclosure
              'CWE-200': { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'L', I:'N', A:'N' }, // Info Disclosure
              'CWE-209': { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'L', I:'N', A:'N' }, // Error Message Info Leak
              // DoS
              'CWE-400': { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'N', I:'N', A:'H' }, // Uncontrolled Resource Consumption
              'CWE-770': { AV:'N', AC:'L', PR:'N', UI:'N', S:'U', C:'N', I:'N', A:'H' }, // Allocation Without Limits
            };

            // ─── SLACK ALERT HELPER ────────────────────────────────────
            const sendSlackAlert = async (message) => {
              const webhookUrl = process.env.SLACK_WEBHOOK;
              if (!webhookUrl) {
                console.warn("SLACK_WEBHOOK secret is not set — skipping Slack alert.");
                return;
              }
              try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                await fetch(webhookUrl, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ text: message }),
                  signal: controller.signal
                });
                clearTimeout(timeoutId);
              } catch (slackErr) {
                console.warn(`Slack alert failed: ${slackErr.message}`);
              }
            };

            // ─── READ DIFF ─────────────────────────────────────────────
            let rawDiff;
            try {
              rawDiff = fs.readFileSync('diff.txt', 'utf8');
            } catch (readErr) {
              await sendSlackAlert(
                `🔴 *Security Review Failed — Could Not Read Diff*\n` +
                `> *Repo*: ${context.repo.owner}/${context.repo.repo}\n` +
                `> *PR*: #${context.issue.number}\n` +
                `> *Reason*: diff.txt missing or unreadable: ${readErr.message}`
              );
              core.setFailed(`Could not read diff.txt: ${readErr.message}`);
              return;
            }

            const prLink    = `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${context.issue.number}`;
            const repoLabel = `${context.repo.owner}/${context.repo.repo}`;

            const wasTruncated  = rawDiff.length > MAX_DIFF_CHARS;
            const truncatedDiff = wasTruncated
              ? rawDiff.slice(0, MAX_DIFF_CHARS) + '\n\n[... diff truncated due to size ...]'
              : rawDiff;

            if (!truncatedDiff.trim()) {
              console.log('No diff found. Skipping security review.');
              return;
            }

            console.log(`Raw diff size  : ${rawDiff.length} chars`);
            console.log(`Sent to model  : ${truncatedDiff.length} chars`);
            console.log(`Input  tokens (approx): ~${Math.round(truncatedDiff.length / 4)}`);
            console.log(`Output tokens (max):     ${MAX_TOKENS}`);
            if (wasTruncated) console.log('WARNING: Diff was truncated — some changes were NOT reviewed!');

            const today = new Date().toISOString().split('T')[0];

            // ─── SYSTEM PROMPT ─────────────────────────────────────────
            // KEY CHANGE: The model is NO LONGER asked to compute CVSS scores
            // or assign severity labels. It only identifies vulnerabilities and
            // selects the 8 qualitative CVSS metric values. All scoring math
            // is done by the deterministic computeCVSS31() function above.
            // This is the primary fix for inconsistent severity across runs.
            const systemPrompt = [
              "You are a senior application security engineer performing a thorough code security audit.",
              "Your ONLY job is to find real security vulnerabilities in the code diff provided.",
              "",
              "OUTPUT FORMAT: You MUST respond with ONLY a valid JSON object. No markdown, no explanation, no preamble.",
              "Do NOT wrap JSON in backticks or code blocks. Output raw JSON only.",
              "",
              "DO NOT compute CVSS scores. DO NOT assign severity labels. DO NOT output CVSS scores.",
              "Your job is ONLY to identify vulnerabilities and select the 8 CVSS metric letters.",
              "Scores and severity labels will be computed deterministically by the calling system.",
              "",
              "JSON SCHEMA (output exactly this structure):",
              "{",
              '  "findings": [',
              "    {",
              '      "title": "Short vulnerability title (max 10 words)",',
              '      "file": "path/to/file.ext",',
              '      "line": 42,',
              '      "cwe": "CWE-89",',
              '      "owasp": "A03:2021",',
              '      "description": "What the vulnerability is and why it is dangerous.",',
              '      "fix_before": "The insecure line or block of code",',
              '      "fix_after": "The secure replacement code",',
              '      "certainty": "Confirmed|Likely|Possible|Unlikely",',
              '      "metrics": {',
              '        "AV": "N|A|L|P",',
              '        "AC": "L|H",',
              '        "PR": "N|L|H",',
              '        "UI": "N|R",',
              '        "S":  "U|C",',
              '        "C":  "N|L|H",',
              '        "I":  "N|L|H",',
              '        "A":  "N|L|H"',
              "      }",
              "    }",
              "  ],",
              '  "checklist": [',
              "    {",
              '      "class": "SQL Injection (SQLi)",',
              '      "status": "Not Found|Found",',
              '      "notes": "One sentence explaining what you checked and why it was ruled out or flagged."',
              "    }",
              "  ]",
              "}",
              "",
              "METRIC SELECTION RULES — follow these exactly, they are not negotiable:",
              "AV (Attack Vector):",
              "  N = Exploitable remotely over the internet with no physical or network proximity required",
              "  A = Requires access to the same local network or Bluetooth, not the internet",
              "  L = Requires local OS user account or process on the same machine",
              "  P = Requires physical hardware access",
              "AC (Attack Complexity):",
              "  L = No special conditions, race conditions, or configuration prerequisites required",
              "  H = Requires a race condition, specific non-default config, or hard-to-reproduce conditions",
              "PR (Privileges Required):",
              "  N = No login or account needed to exploit",
              "  L = Regular authenticated user account needed",
              "  H = Administrator or privileged account needed",
              "UI (User Interaction):",
              "  N = Attacker can exploit with no victim action needed",
              "  R = A victim must click a link, open a file, or take some action",
              "S (Scope):",
              "  U = Impact stays within the vulnerable component only",
              "  C = Impact can reach other components or systems beyond the vulnerable one",
              "C (Confidentiality Impact):",
              "  H = Total loss of confidentiality; attacker can read all data",
              "  L = Some data exposed but not all, or attacker cannot control what is read",
              "  N = No confidentiality impact",
              "I (Integrity Impact):",
              "  H = Total loss of integrity; attacker can modify any data",
              "  L = Some data can be modified but attacker cannot control scope",
              "  N = No integrity impact",
              "A (Availability Impact):",
              "  H = Total loss of availability; service can be completely shut down",
              "  L = Reduced performance or intermittent availability",
              "  N = No availability impact",
              "",
              "CERTAINTY RULES:",
              "  Confirmed : Vulnerable line(s) are directly visible in the diff with no ambiguity",
              "  Likely    : Strong risk pattern present but full exploit depends on calling context",
              "  Possible  : Suspicious pattern; requires assumptions about code outside the diff",
              "  Unlikely  : Theoretical or edge-case risk; low confidence",
              "",
              "CHECKLIST: Always include all 12 vulnerability classes below in the checklist array:",
              "  SQL Injection (SQLi), Cross-Site Scripting (XSS), Server-Side Request Forgery (SSRF),",
              "  Authentication / Auth Bypass, Hardcoded Secrets / API Keys, Insecure Direct Object Reference (IDOR),",
              "  Remote Code Execution (RCE), Cross-Site Request Forgery (CSRF), Open Redirect,",
              "  Weak Cryptography, Broken Access Control, Supply Chain / Dependency Risk",
              "",
              "STRICT RULES:",
              "  - Report ONLY real security vulnerabilities. Never comment on code style, performance, or tests.",
              "  - Every metrics object MUST have all 8 keys: AV, AC, PR, UI, S, C, I, A.",
              "  - Every metric value MUST be from the allowed set for that metric.",
              "  - If you find no vulnerabilities, return an empty findings array: []",
              "  - Output ONLY the raw JSON. Any text outside the JSON object will break parsing."
            ].join("\n");

            const userPrompt =
              "Analyze the following code diff for security vulnerabilities.\n" +
              "Return ONLY the raw JSON object as specified. No other text.\n\n" +
              "PR changes to analyze:\n" +
              truncatedDiff;

            try {
              console.log(`Calling Claude Haiku 4.5...`);

              const controller = new AbortController();
              const timeoutId  = setTimeout(() => controller.abort(), 120000);

              let response;
              try {
                response = await fetch("https://api.anthropic.com/v1/messages", {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    "x-api-key": process.env.ANTHROPIC_API_KEY,
                    "anthropic-version": "2023-06-01"
                  },
                  body: JSON.stringify({
                    model: MODEL,
                    max_tokens: MAX_TOKENS,
                    temperature: 0,        // deterministic token selection — reduces metric variance
                    system: systemPrompt,
                    messages: [{ role: "user", content: userPrompt }]
                  }),
                  signal: controller.signal
                });
              } finally {
                clearTimeout(timeoutId);
              }

              // ─── Handle non-2xx responses ──────────────────────────
              if (!response.ok) {
                const errorBody = await response.json().catch(() => ({}));
                const errorType = errorBody?.error?.type ?? "";
                const errorMsg  = errorBody?.error?.message ?? JSON.stringify(errorBody);

                if (response.status === 429 || errorType === "rate_limit_error") {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body: [
                      "## Security Review — Skipped ⚠️",
                      "",
                      "> **Reason**: Anthropic API rate limit or quota exceeded during scan.",
                      "> Reported to security team."
                    ].join("\n")
                  });
                  await sendSlackAlert(
                    `⚠️ *Security Review Skipped — Anthropic Rate Limit Hit During Scan*\n` +
                    `> *Repo*: ${repoLabel}\n` +
                    `> *PR*: <${prLink}|#${context.issue.number}>\n` +
                    `> *Reason*: Rate limit or quota exceeded during scan.\n` +
                    `> *Action*: Check your Anthropic API plan or rotate the \`ANTHROPIC_API_KEY\` secret.`
                  );
                  core.setFailed("Security review skipped: Anthropic API rate limit exceeded.");
                  return;
                }

                await sendSlackAlert(
                  `🔴 *Security Review Failed — Anthropic API Error During Scan*\n` +
                  `> *Repo*: ${repoLabel}\n` +
                  `> *PR*: <${prLink}|#${context.issue.number}>\n` +
                  `> *HTTP Status*: ${response.status}\n` +
                  `> *Detail*: \`${errorMsg}\``
                );
                core.setFailed(`Anthropic API error ${response.status}: ${errorMsg}`);
                return;
              }

              const data = await response.json();

              // ─── Extract raw text from response ───────────────────
              const rawText = (data?.content ?? [])
                .filter(block => block.type === "text")
                .map(block => block.text)
                .join("\n")
                .trim();

              if (!rawText) {
                await sendSlackAlert(
                  `🔴 *Security Review Failed — Empty Response from Claude Haiku*\n` +
                  `> *Repo*: ${repoLabel}\n` +
                  `> *PR*: <${prLink}|#${context.issue.number}>\n` +
                  `> *Detail*: Model returned no text content.`
                );
                core.setFailed(`Unexpected Anthropic response structure: ${JSON.stringify(data)}`);
                return;
              }

              const usage = data.usage || {};
              console.log('─── Token Usage ───────────────────────────');
              console.log(`  Input  tokens: ${usage.input_tokens  ?? 'N/A'}`);
              console.log(`  Output tokens: ${usage.output_tokens ?? 'N/A'}`);
              console.log('───────────────────────────────────────────');

              // ─── Parse JSON from model ─────────────────────────────
              let parsed;
              try {
                // Strip any accidental markdown code fences the model may add
                const cleaned = rawText
                  .replace(/^```(?:json)?\s*/i, '')
                  .replace(/\s*```$/,            '')
                  .trim();
                parsed = JSON.parse(cleaned);
              } catch (parseErr) {
                await sendSlackAlert(
                  `🔴 *Security Review Failed — Could Not Parse Model JSON*\n` +
                  `> *Repo*: ${repoLabel}\n` +
                  `> *PR*: <${prLink}|#${context.issue.number}>\n` +
                  `> *Detail*: ${parseErr.message}\n` +
                  `> *Raw output (first 500 chars)*: \`${rawText.slice(0, 500)}\``
                );
                core.setFailed(`JSON parse error: ${parseErr.message}`);
                return;
              }

              const rawFindings = Array.isArray(parsed?.findings) ? parsed.findings : [];
              const checklist   = Array.isArray(parsed?.checklist) ? parsed.checklist : [];

              // ─── DETERMINISTIC SCORING ─────────────────────────────
              // For each finding:
              //   1. If CWE matches our lookup table → use canonical vector (near-100% consistent)
              //   2. Otherwise → use model-supplied metrics (still consistent because
              //      computeCVSS31 is pure math — same metrics always produce same score)
              // The model NEVER assigns the score or severity; this code does.
              const findings = rawFindings.map((f, idx) => {
                const cweKey         = (f.cwe ?? '').toUpperCase().replace(/\s/g, '');
                const canonicalMetrics = CWE_VECTORS[cweKey];
                const metrics        = canonicalMetrics ?? f.metrics;
                const usedCanonical  = !!canonicalMetrics;

                // Validate all 8 metrics are present and valid
                const validAV = ['N','A','L','P'];
                const validAC = ['L','H'];
                const validPR = ['N','L','H'];
                const validUI = ['N','R'];
                const validS  = ['U','C'];
                const validCI = ['N','L','H'];

                const isValid =
                  metrics &&
                  validAV.includes(metrics.AV) &&
                  validAC.includes(metrics.AC) &&
                  validPR.includes(metrics.PR) &&
                  validUI.includes(metrics.UI) &&
                  validS.includes(metrics.S)   &&
                  validCI.includes(metrics.C)  &&
                  validCI.includes(metrics.I)  &&
                  validCI.includes(metrics.A);

                if (!isValid) {
                  console.warn(`Finding ${idx + 1} ("${f.title}") has invalid or missing metrics — skipping CVSS scoring.`);
                  return { ...f, score: null, severity: 'Unknown', vector: 'Invalid metrics', usedCanonical };
                }

                const score    = computeCVSS31(metrics);
                const severity = getSeverity(score);
                const vector   = getVector(metrics);

                console.log(`Finding ${idx + 1}: "${f.title}" | CWE: ${f.cwe} | Vector: ${vector} | Score: ${score} | Severity: ${severity}${usedCanonical ? ' [canonical]' : ' [model metrics]'}`);

                return { ...f, metrics, score, severity, vector, usedCanonical };
              });

              // ─── Group by severity ─────────────────────────────────
              const groups = { Critical: [], High: [], Medium: [], Low: [], Info: [], Unknown: [] };
              for (const f of findings) {
                (groups[f.severity] ?? groups.Unknown).push(f);
              }

              const totalFindings = findings.filter(f => f.severity !== 'Unknown').length;

              // ─── Build PR comment (markdown) ───────────────────────
              const severityOrder  = ['Critical', 'High', 'Medium', 'Low', 'Info'];
              const severityEmoji  = { Critical: '🔴', High: '🟠', Medium: '🟡', Low: '🔵', Info: 'ℹ️' };
              const prefixMap      = { Critical: 'CRIT', High: 'HIGH', Medium: 'MED', Low: 'LOW', Info: 'INFO' };

              let commentBody = `## Security Review\n\n`;
              commentBody    += `> **Model**: \`${MODEL}\` | **Scan Date**: ${today}\n\n`;
              commentBody    += `**Summary**: ${totalFindings} issue(s) found — `;
              commentBody    += `Critical ${groups.Critical.length} | High ${groups.High.length} | Medium ${groups.Medium.length} | Low ${groups.Low.length} | Info ${groups.Info.length}\n\n`;
              commentBody    += `> 🔒 CVSS v3.1 scores computed deterministically from vector metrics by the CI system — not by the AI model. Same diff will always produce the same score.\n\n`;
              commentBody    += `---\n\n`;

              for (const sev of severityOrder) {
                const group = groups[sev];
                if (!group || group.length === 0) continue;

                commentBody += `### ${severityEmoji[sev]} ${sev} Issues\n\n`;
                commentBody += `| Severity | CVSS Score | CVSS Vector | Certainty | File | Line | Issue |\n`;
                commentBody += `|----------|------------|-------------|-----------|------|------|-------|\n`;
                for (const f of group) {
                  commentBody += `| ${sev} | ${f.score} | \`${f.vector}\` | ${f.certainty} | \`${f.file}\` | ${f.line} | ${f.title} |\n`;
                }
                commentBody += `\n`;

                const prefix = prefixMap[sev];
                group.forEach((f, i) => {
                  const id = `${prefix}-${i + 1}`;
                  commentBody += `**[${id}] ${f.title}**\n`;
                  commentBody += `- **Severity**: ${sev}\n`;
                  commentBody += `- **CVSS Base Score**: ${f.score}\n`;
                  commentBody += `- **CVSS Vector**: \`${f.vector}\`\n`;
                  commentBody += `- **CVSS Breakdown**:\n`;
                  commentBody += `  - AV: ${f.metrics.AV} | AC: ${f.metrics.AC} | PR: ${f.metrics.PR} | UI: ${f.metrics.UI}\n`;
                  commentBody += `  - S: ${f.metrics.S} | C: ${f.metrics.C} | I: ${f.metrics.I} | A: ${f.metrics.A}\n`;
                  if (f.usedCanonical) {
                    commentBody += `- **Vector Source**: Canonical CWE lookup table (deterministic)\n`;
                  } else {
                    commentBody += `- **Vector Source**: Model-assigned metrics (temperature=0)\n`;
                  }
                  commentBody += `- **Certainty**: ${f.certainty}\n`;
                  commentBody += `- **CWE**: ${f.cwe}\n`;
                  commentBody += `- **OWASP**: ${f.owasp}\n`;
                  commentBody += `- **Description**: ${f.description}\n`;
                  commentBody += `- **Fix**:\n`;
                  commentBody += `\`\`\`diff\n- ${f.fix_before}\n+ ${f.fix_after}\n\`\`\`\n\n`;
                });

                commentBody += `---\n\n`;
              }

              // ─── Security Checklist ────────────────────────────────
              if (checklist.length > 0) {
                commentBody += `### Security Checklist\n\n`;
                commentBody += `| Vulnerability Class | Status | Notes |\n`;
                commentBody += `|---------------------|--------|-------|\n`;
                for (const item of checklist) {
                  const icon = item.status === 'Found' ? '🔴' : '✅';
                  commentBody += `| ${item.class} | ${icon} ${item.status} | ${item.notes} |\n`;
                }
                commentBody += `\n---\n\n`;
              }

              // ─── Footer ────────────────────────────────────────────
              const footerLines = [
                `> 🤖 **Model**: \`${MODEL}\``,
                `> 📊 **Tokens** — Input: \`${usage.input_tokens ?? 'N/A'}\` | Output: \`${usage.output_tokens ?? 'N/A'}\``,
                `> 📅 **Scanned**: ${today}`,
                `> 🔢 **Scoring**: CVSS v3.1 Base Score computed by CI system from vector metrics. Model outputs metric letters only — never scores or severity labels.`,
              ];
              if (wasTruncated) {
                footerLines.push(`> ⚠️ **Warning**: Diff was truncated — some changes were NOT reviewed. Consider splitting this PR.`);
              }
              commentBody += footerLines.join('\n') + '\n';

              // ─── Post PR comment ───────────────────────────────────
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });

              console.log(`Security review posted successfully on PR #${context.issue.number}`);

              // ─── Slack summary ─────────────────────────────────────
              const summaryLines = [
                totalFindings === 0
                  ? `✅ *Security Review Complete — No Findings*`
                  : `🔎 *Security Review Complete — ${totalFindings} Finding(s) Found*`,
                `> *Repo*: ${repoLabel}`,
                `> *PR*: <${prLink}|#${context.issue.number}>`,
                `> *Model*: \`${MODEL}\``,
                `> *Scanned*: ${today}`,
                `> *Summary*: Critical: ${groups.Critical.length} | High: ${groups.High.length} | Medium: ${groups.Medium.length} | Low: ${groups.Low.length} | Info: ${groups.Info.length}`,
              ];

              if (totalFindings > 0) {
                summaryLines.push('');
                summaryLines.push('*Findings:*');
                summaryLines.push('```');
                summaryLines.push('Severity   | Score | Finding');
                summaryLines.push('-----------|-------|' + '-'.repeat(40));
                for (const sev of severityOrder) {
                  for (const f of (groups[sev] ?? [])) {
                    summaryLines.push(`${sev.padEnd(10)} | ${String(f.score).padEnd(5)} | ${f.title}`);
                  }
                }
                summaryLines.push('```');
              }

              if (wasTruncated) {
                summaryLines.push(`> ⚠️ *Warning*: Diff was truncated — some changes were NOT reviewed. Consider splitting this PR.`);
              }

              await sendSlackAlert(summaryLines.join('\n'));

            } catch (error) {
              await sendSlackAlert(
                `🔴 *Security Review Failed — Script Crash*\n` +
                `> *Repo*: ${repoLabel}\n` +
                `> *PR*: <${prLink}|#${context.issue.number}>\n` +
                `> *Error*: ${error.message}`
              );
              core.setFailed(`Script error: ${error.message}\n${error.stack}`);
            }
