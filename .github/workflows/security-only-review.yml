name: Security-Only PR Review (OpenAI GPT-5.4-mini)
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Get PR diff
        run: git diff --no-color --unified=2 origin/${{ github.base_ref }}...HEAD > diff.txt

      - name: Validate available GPT-5.4 models
        run: |
          echo "Checking available GPT-5.4 models..."
          curl -s https://api.openai.com/v1/models \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            | jq '[.data[].id | select(test("5\\.4"; "i"))]'

      - name: Run Security-Only Review with GPT-5.4-mini
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const rawDiff = fs.readFileSync('diff.txt', 'utf8');

            // ─── CONFIG ────────────────────────────────────────────────
            const MAX_DIFF_CHARS        = 120000;
            const MAX_COMPLETION_TOKENS = 8000;

            const MODELS = [
              { name: 'gpt-5.4-mini',  useCompletionTokens: true  },
              { name: 'gpt-4o-mini',   useCompletionTokens: false }
            ];
            // ───────────────────────────────────────────────────────────

            const wasTruncated = rawDiff.length > MAX_DIFF_CHARS;

            const truncatedDiff = wasTruncated
              ? rawDiff.slice(0, MAX_DIFF_CHARS) + '\n\n[... diff truncated due to size ...]'
              : rawDiff;

            if (!truncatedDiff.trim()) {
              console.log('No diff found. Skipping security review.');
              return;
            }

            console.log(`Raw diff size  : ${rawDiff.length} chars`);
            console.log(`Sent to model  : ${truncatedDiff.length} chars`);
            console.log(`Input  tokens (approx): ~${Math.round(truncatedDiff.length / 4)}`);
            console.log(`Output tokens (max):     ${MAX_COMPLETION_TOKENS}`);
            if (wasTruncated) {
              console.log('WARNING: Diff was truncated — some changes were NOT reviewed!');
            }

            const today = new Date().toISOString().split('T')[0];

            const systemPrompt = "You are a precise security auditor. Analyze every changed line deeply and trace all data flows. Severity is STRICTLY derived from the CVSS v3.1 Base Score you compute using all 8 metrics: AV, AC, PR, UI, S, C, I, A. Output ONLY real, traceable vulnerabilities using the exact field format provided — no prose, no summaries, no padding. If nothing is found, respond with exactly: 'No security issues identified in this diff.'";

            const prompt = "You are a senior Application Security Engineer performing a thorough security audit.\n" +
              "Your ONLY job is to analyze the code changes below and report security issues.\n\n" +
              "STRICT RULES:\n" +
              "- Report ONLY real security vulnerabilities (OWASP Top 10, CWE, injection, SSRF, auth bypass, broken access control, secrets leakage, logic flaws, data-flow issues, supply-chain risks, etc.).\n" +
              "- NEVER comment on code style, performance, tests, maintainability, or anything non-security.\n" +
              "- Severity MUST be derived exclusively from the CVSS v3.1 Base Score you calculate. No exceptions.\n" +
              "- For EVERY finding you MUST compute the CVSS v3.1 Base Score by explicitly evaluating all 8 metrics:\n" +
              "    • Attack Vector (AV)       — Network / Adjacent / Local / Physical\n" +
              "    • Attack Complexity (AC)   — Low / High\n" +
              "    • Privileges Required (PR) — None / Low / High\n" +
              "    • User Interaction (UI)    — None / Required\n" +
              "    • Scope (S)                — Unchanged / Changed\n" +
              "    • Confidentiality (C)      — None / Low / High\n" +
              "    • Integrity (I)            — None / Low / High\n" +
              "    • Availability (A)         — None / Low / High\n" +
              "- Map the computed CVSS Base Score to severity using the official NVD scale:\n" +
              "    • 9.0 – 10.0  → Critical\n" +
              "    • 7.0 – 8.9   → High\n" +
              "    • 4.0 – 6.9   → Medium\n" +
              "    • 0.1 – 3.9   → Low\n" +
              "    • 0.0         → Info\n" +
              "- You MUST analyze every single changed line deeply and trace data flows end to end.\n" +
              "- The Security Checklist section is OPTIONAL — include it only when you find zero issues and want to document what was checked. Omit it entirely when issues are found.\n\n" +
              "SEVERITY DEFINITIONS (CVSS v3.1 Base Score ranges):\n" +
              "- Critical (9.0–10.0) : Immediate exploitation possible — e.g. unauthenticated RCE, SQLi with full DB access, hardcoded admin secrets.\n" +
              "- High     (7.0–8.9)  : Significant impact, likely exploitable — e.g. SSRF, IDOR, privilege escalation, stored XSS.\n" +
              "- Medium   (4.0–6.9)  : Moderate impact, needs specific conditions — e.g. open redirect, weak crypto, missing rate-limit, CSRF.\n" +
              "- Low      (0.1–3.9)  : Minor risk, limited impact — e.g. verbose errors, missing security headers, overly broad CORS.\n" +
              "- Info     (0.0)      : Best-practice observations with no direct exploitability.\n\n" +
              "OUTPUT FORMAT (follow exactly):\n\n" +
              "## Security Review\n\n" +
              "> **Model**: GPT-5.4-mini | **Scan Date**: " + today + "\n\n" +
              "**Summary**: X issue(s) found — Critical N | High N | Medium N | Low N\n\n" +
              "---\n\n" +
              "Repeat the block below once per issue found, in descending CVSS score order:\n\n" +
              "---\n\n" +
              "**Issue**: <short descriptive title>\n\n" +
              "**CVSS**: `<score> (<severity>)` — `AV:_/AC:_/PR:_/UI:_/S:_/C:_/I:_/A:_`\n\n" +
              "| Metric | Value | Rationale |\n" +
              "|--------|-------|-----------|\n" +
              "| Attack Vector (AV) | Network / Adjacent / Local / Physical | one-line reason |\n" +
              "| Attack Complexity (AC) | Low / High | one-line reason |\n" +
              "| Privileges Required (PR) | None / Low / High | one-line reason |\n" +
              "| User Interaction (UI) | None / Required | one-line reason |\n" +
              "| Scope (S) | Unchanged / Changed | one-line reason |\n" +
              "| Confidentiality (C) | None / Low / High | one-line reason |\n" +
              "| Integrity (I) | None / Low / High | one-line reason |\n" +
              "| Availability (A) | None / Low / High | one-line reason |\n\n" +
              "**Severity**: CRITICAL / HIGH / MEDIUM / LOW  *(derived from CVSS score above)*\n\n" +
              "**Certainty**: Confirmed / Suspected / Unverified concern\n\n" +
              "**Location**: `path/to/file` line N\n\n" +
              "**Exploit path**: One sentence — how this is exploited in practice.\n\n" +
              "**Fix**:\n" +
              "```diff\n" +
              "- insecure code\n" +
              "+ secure code\n" +
              "```\n\n" +
              "---\n\n" +
              "If no security issues are found, respond with exactly:\n" +
              "\"No security issues identified in this diff.\"\n\n" +
              "STRICT OUTPUT RULES:\n" +
              "- You MUST follow the EXACT field order above for every issue: Issue → CVSS score + vector → CVSS Breakdown table → Severity → Certainty → Location → Exploit path → Fix.\n" +
              "- Do NOT add any extra explanation, commentary, or prose outside of these fields.\n" +
              "- Do NOT summarize findings anywhere outside the Summary line.\n" +
              "- Do NOT skip any field — every field is mandatory for every issue.\n" +
              "- Do NOT rename, reorder, or merge any fields.\n" +
              "- Do NOT fill the report with low-confidence observations to appear thorough — only report real, traceable vulnerabilities.\n" +
              "- CVSS vector string MUST follow the exact format: AV:_/AC:_/PR:_/UI:_/S:_/C:_/I:_/A:_\n" +
              "- Severity MUST exactly match the NVD band of the computed CVSS score — no manual overrides.\n\n" +
              "PR changes to analyze:\n" +
              truncatedDiff;

            try {
              let response, usedModel;

              for (const model of MODELS) {
                console.log(`Trying model: ${model.name}`);

                const tokenParam = model.useCompletionTokens
                  ? { max_completion_tokens: MAX_COMPLETION_TOKENS }
                  : { max_tokens: MAX_COMPLETION_TOKENS };

                response = await fetch("https://api.openai.com/v1/chat/completions", {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${process.env.OPENAI_API_KEY}`
                  },
                  body: JSON.stringify({
                    model: model.name,
                    messages: [
                      {
                        role: "system",
                        content: systemPrompt
                      },
                      {
                        role: "user",
                        content: prompt
                      }
                    ],
                    temperature: 0.1,
                    ...tokenParam
                  })
                });

                if (response.ok) {
                  usedModel = model.name;
                  console.log(`Using model: ${usedModel}`);
                  break;
                }

                const errorBody = await response.text();
                console.warn(`Model ${model.name} failed (HTTP ${response.status}): ${errorBody}`);

                if (response.status !== 404 && response.status !== 400) {
                  core.setFailed(`OpenAI API error ${response.status}: ${errorBody}`);
                  return;
                }
              }

              if (!response || !response.ok) {
                core.setFailed('All model fallbacks exhausted. Could not complete security review.');
                return;
              }

              const data = await response.json();

              if (!data.choices?.[0]?.message?.content) {
                core.setFailed(`Unexpected OpenAI response structure: ${JSON.stringify(data)}`);
                return;
              }

              const reviewText = data.choices[0].message.content;

              const usage = data.usage || {};
              console.log('─── Token Usage ───────────────────────────');
              console.log(`  Prompt (input)     : ${usage.prompt_tokens     ?? 'N/A'} tokens`);
              console.log(`  Completion (output): ${usage.completion_tokens ?? 'N/A'} tokens`);
              console.log(`  Total              : ${usage.total_tokens      ?? 'N/A'} tokens`);
              console.log('───────────────────────────────────────────');


              const footer = [
                '',
                '---',
                wasTruncated ? '> WARNING: Diff was truncated — some changes were NOT reviewed. Consider splitting this PR.' : '',
                `> 🤖 **Model used**: \`${usedModel}\``,
                `> 📊 **Tokens** — Input: \`${usage.prompt_tokens ?? 'N/A'}\` | Output: \`${usage.completion_tokens ?? 'N/A'}\` | Total: \`${usage.total_tokens ?? 'N/A'}\``,
                `> 📅 **Scanned**: ${today}`
              ].filter(Boolean).join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: reviewText + footer
              });

              console.log(`Security review posted successfully on PR #${context.issue.number}`);

            } catch (error) {
              core.setFailed(`Script error: ${error.message}\n${error.stack}`);
            }
