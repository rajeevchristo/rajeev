name: Security-Only PR Review (OpenAI GPT-5.4-mini)
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Get PR diff
        run: git diff --no-color --unified=2 origin/${{ github.base_ref }}...HEAD > diff.txt

      - name: Validate available GPT-5.4 models
        run: |
          echo "Checking available GPT-5.4 models..."
          curl -s https://api.openai.com/v1/models \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            | jq '[.data[].id | select(test("5\\.4"; "i"))]'

      - name: Run Security-Only Review with GPT-5.4-mini
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const rawDiff = fs.readFileSync('diff.txt', 'utf8');

            // ─── CONFIG ────────────────────────────────────────────────
            const MAX_DIFF_CHARS        = 120000;
            const MAX_COMPLETION_TOKENS = 8000;

            const MODELS = [
              { name: 'gpt-5.4-mini',  useCompletionTokens: true  },
              { name: 'gpt-4o-mini',   useCompletionTokens: false }
            ];
            // ───────────────────────────────────────────────────────────

            const wasTruncated = rawDiff.length > MAX_DIFF_CHARS;

            const truncatedDiff = wasTruncated
              ? rawDiff.slice(0, MAX_DIFF_CHARS) + '\n\n[... diff truncated due to size ...]'
              : rawDiff;

            if (!truncatedDiff.trim()) {
              console.log('No diff found. Skipping security review.');
              return;
            }

            console.log(`Raw diff size  : ${rawDiff.length} chars`);
            console.log(`Sent to model  : ${truncatedDiff.length} chars`);
            console.log(`Input  tokens (approx): ~${Math.round(truncatedDiff.length / 4)}`);
            console.log(`Output tokens (max):     ${MAX_COMPLETION_TOKENS}`);
            if (wasTruncated) {
              console.log('WARNING: Diff was truncated — some changes were NOT reviewed!');
            }

            const today = new Date().toISOString().split('T')[0];

            const systemPrompt = "You are an aggressive security auditor who never misses vulnerabilities. You MUST analyze every changed line deeply and trace all data flows. Never return a response under 300 tokens — a thorough review always requires detailed output. Report ONLY real, confirmed or well-grounded security issues. Do NOT pad the report with low-confidence observations to appear thorough. If no security issues are found, respond with exactly: \"No security issues identified in this diff.\"";

            const prompt = "You are a senior Application Security Engineer performing a thorough security audit.\n" +
              "Your ONLY job is to analyze the code changes below and report security issues.\n\n" +
              "STRICT RULES:\n" +
              "- Report ONLY real security vulnerabilities (OWASP Top 10, CWE, injection, SSRF, auth bypass, broken access control, secrets leakage, logic flaws, data-flow issues, supply-chain risks, etc.).\n" +
              "- NEVER comment on code style, performance, tests, maintainability, or anything non-security.\n" +
              "- You MUST analyze every single changed line deeply and trace data flows end to end.\n" +
              "- If no security issues are found, respond with exactly: \"No security issues identified in this diff.\" Do NOT fill the report with low-confidence observations to appear thorough.\n\n" +
              "SEVERITY DEFINITIONS:\n" +
              "- CRITICAL : Immediate exploitation possible — RCE, SQLi, hardcoded secrets, auth bypass.\n" +
              "- HIGH     : Significant impact, likely exploitable — SSRF, IDOR, privilege escalation, XSS.\n" +
              "- MEDIUM   : Moderate impact, needs specific conditions — open redirect, weak crypto, missing rate-limit, CSRF.\n" +
              "- LOW      : Minor risk, limited impact — verbose errors, missing security headers, overly broad CORS.\n\n" +
              "CERTAINTY DEFINITIONS:\n" +
              "- Confirmed       : Vulnerability is clearly present and exploitable as written.\n" +
              "- Suspected       : Strong indication of a vulnerability; requires minor assumptions.\n" +
              "- Unverified concern : Possible risk but depends on context not visible in the diff.\n\n" +
              "OUTPUT FORMAT (follow exactly — one block per issue):\n\n" +
              "## Security Review\n\n" +
              "> **Model**: GPT-5.4-mini | **Scan Date**: " + today + "\n\n" +
              "---\n\n" +
              "* Issue: <title>\n" +
              "* CVSS: <score e.g. 9.8 (Critical) — AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H>\n" +
              "* Severity: CRITICAL / HIGH / MEDIUM / LOW\n" +
              "* Certainty: Confirmed / Suspected / Unverified concern\n" +
              "* Location: <file path>:<line number(s)>\n" +
              "* Exploit path: <one sentence — how this is exploited in practice>\n" +
              "* Fix:\n" +
              "```diff\n" +
              "- insecure code\n" +
              "+ secure code\n" +
              "```\n\n" +
              "---\n\n" +
              "*(Repeat the block above for each issue. Do NOT add extra explanation outside the format. Do NOT summarize. Do NOT skip any field. Do NOT rename fields.)*\n\n" +
              "> Auto-generated review. Always verify findings manually before acting.\n\n" +
              "IMPORTANT:\n" +
              "- Use EXACTLY the field names shown: Issue, CVSS, Severity, Certainty, Location, Exploit path, Fix.\n" +
              "- Each issue must be separated by a `---` divider.\n" +
              "- Do NOT add section headers like 'Critical Issues' or 'High Issues'.\n" +
              "- Do NOT add a summary table or checklist.\n" +
              "- Do NOT add any prose outside the structured blocks.\n" +
              "- If no security issues are found, respond with exactly: \"No security issues identified in this diff.\"\n\n" +
              "PR changes to analyze:\n" +
              truncatedDiff;

            try {
              let response, usedModel;

              for (const model of MODELS) {
                console.log(`Trying model: ${model.name}`);

                const tokenParam = model.useCompletionTokens
                  ? { max_completion_tokens: MAX_COMPLETION_TOKENS }
                  : { max_tokens: MAX_COMPLETION_TOKENS };

                response = await fetch("https://api.openai.com/v1/chat/completions", {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${process.env.OPENAI_API_KEY}`
                  },
                  body: JSON.stringify({
                    model: model.name,
                    messages: [
                      {
                        role: "system",
                        content: systemPrompt
                      },
                      {
                        role: "user",
                        content: prompt
                      }
                    ],
                    temperature: 0.1,
                    ...tokenParam
                  })
                });

                if (response.ok) {
                  usedModel = model.name;
                  console.log(`Using model: ${usedModel}`);
                  break;
                }

                const errorBody = await response.text();
                console.warn(`Model ${model.name} failed (HTTP ${response.status}): ${errorBody}`);

                if (response.status !== 404 && response.status !== 400) {
                  core.setFailed(`OpenAI API error ${response.status}: ${errorBody}`);
                  return;
                }
              }

              if (!response || !response.ok) {
                core.setFailed('All model fallbacks exhausted. Could not complete security review.');
                return;
              }

              const data = await response.json();

              if (!data.choices?.[0]?.message?.content) {
                core.setFailed(`Unexpected OpenAI response structure: ${JSON.stringify(data)}`);
                return;
              }

              const reviewText = data.choices[0].message.content;

              const usage = data.usage || {};
              console.log('─── Token Usage ───────────────────────────');
              console.log(`  Prompt (input)     : ${usage.prompt_tokens     ?? 'N/A'} tokens`);
              console.log(`  Completion (output): ${usage.completion_tokens ?? 'N/A'} tokens`);
              console.log(`  Total              : ${usage.total_tokens      ?? 'N/A'} tokens`);
              console.log('───────────────────────────────────────────');

              if ((usage.completion_tokens ?? 0) < 300) {
                console.warn('WARNING: Output tokens very low — model may not have done a full review!');
              }

              const footer = [
                '',
                '---',
                wasTruncated ? '> ⚠️ WARNING: Diff was truncated — some changes were NOT reviewed. Consider splitting this PR.' : '',
                (usage.completion_tokens ?? 0) < 300 ? '> ⚠️ WARNING: Model output was very short — review may be incomplete. Re-run or review manually.' : '',
                `> 🤖 **Model used**: \`${usedModel}\``,
                `> 📊 **Tokens** — Input: \`${usage.prompt_tokens ?? 'N/A'}\` | Output: \`${usage.completion_tokens ?? 'N/A'}\` | Total: \`${usage.total_tokens ?? 'N/A'}\``,
                `> 📅 **Scanned**: ${today}`
              ].filter(Boolean).join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: reviewText + footer
              });

              console.log(`Security review posted successfully on PR #${context.issue.number}`);

            } catch (error) {
              core.setFailed(`Script error: ${error.message}\n${error.stack}`);
            }
